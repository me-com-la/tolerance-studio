<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MLP Image Library</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f0f0ee;
  --surface: #fff;
  --border: #e0e0de;
  --text: #111;
  --muted: #aaa;
  --sidebar-w: 220px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── Sidebar ─────────────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  scrollbar-width: none;
}
#sidebar::-webkit-scrollbar { display: none; }

/* Brand toggle */
#brand-row {
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
#brand-toggle {
  display: flex;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  overflow: hidden;
  width: 100%;
}
#brand-toggle button {
  flex: 1;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 6px 0;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all .12s;
}
#brand-toggle button.active { background: #111; color: #fff; }

#reset-all {
  font-size: 10px;
  padding: 5px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  width: 100%;
  text-align: center;
  transition: all .1s;
  letter-spacing: .03em;
}
#reset-all:hover { background: #fee2e2; border-color: #fca5a5; color: #b91c1c; }

/* Accordion filter items */
.facc { border-bottom: 1px solid var(--border); }

.facc-head {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 7px 12px;
  cursor: pointer;
  user-select: none;
  transition: background .1s;
}
.facc-head:hover { background: var(--bg); }

.facc-label {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  width: 52px;
  flex-shrink: 0;
}

.facc-summary {
  font-size: 10px;
  color: var(--text);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 500;
}
.facc-summary.none { color: var(--muted); font-weight: 400; }

.facc-arrow {
  font-size: 11px;
  color: var(--muted);
  transition: transform .15s;
  margin-left: 4px;
  flex-shrink: 0;
}
.facc.open .facc-arrow { transform: rotate(90deg); }

.facc-body {
  display: none;
  padding: 4px 12px 10px;
  flex-wrap: wrap;
  gap: 4px;
}
.facc.open .facc-body { display: flex; }
.facc-body.col { flex-direction: column; gap: 0; }

/* Pills */
.pill {
  font-size: 10px;
  padding: 3px 7px;
  border-radius: 3px;
  border: 1px solid var(--border);
  background: transparent;
  color: #888;
  cursor: pointer;
  transition: all .1s;
  white-space: nowrap;
}
.pill:hover { color: var(--text); border-color: #aaa; }
.pill.active { background: #111; color: #fff; border-color: #111; font-weight: 600; }

.filter-group { display: flex; flex-wrap: wrap; gap: 4px; }

/* AI search body */
#ai-body { padding: 8px 12px 12px; flex-direction: column; gap: 8px; }
#ai-body.open { display: flex; }

#kw-input-wrap { position: relative; width: 100%; }
#kw-search {
  width: 100%;
  font-size: 12px;
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: 5px;
  background: var(--bg);
  color: var(--text);
  outline: none;
}
#kw-search:focus { border-color: #aaa; }
#kw-search::placeholder { color: #ccc; }

#kw-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 3px);
  left: 0; width: 100%;
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 5px;
  overflow: hidden;
  z-index: 50;
  box-shadow: 0 6px 20px rgba(0,0,0,.12);
}
#kw-dropdown.open { display: block; }
.kw-dd-item {
  padding: 7px 10px;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}
.kw-dd-item:hover { background: #f5f5f3; }
.kw-dd-item mark { background: none; color: #c97e00; font-weight: 700; font-style: normal; }
.kw-dd-count { font-size: 10px; color: var(--muted); flex-shrink: 0; }

#kw-mode-toggle {
  display: flex;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  align-self: flex-start;
}
#kw-mode-toggle button {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .06em;
  padding: 4px 10px;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all .1s;
}
#kw-mode-toggle button.active { background: #111; color: #fff; }

#kw-cloud {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  max-height: 380px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: #ddd transparent;
}
.kw-chip {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all .1s;
  user-select: none;
}
.kw-chip:hover { filter: brightness(.92); }
.kw-chip.active { outline: 2px solid #111; outline-offset: 1px; }
.kw-chip .kc { font-size: 9px; opacity: .6; }
.kw-b1 { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; }
.kw-b2 { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
.kw-b3 { background: #fef9c3; color: #854d0e; border-color: #fef08a; }
.kw-b4 { background: #f3e8ff; color: #6b21a8; border-color: #e9d5ff; }
.kw-b5 { background: #ffe4e6; color: #9f1239; border-color: #fecdd3; }
.kw-b6 { background: #e0f2fe; color: #075985; border-color: #bae6fd; }
.kw-b7 { background: #f5f5f4; color: #78716c; border-color: #e7e5e4; }

#kw-active-row { display: flex; flex-wrap: wrap; gap: 4px; }
.kw-act-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 7px 3px 9px;
  border-radius: 4px;
  font-size: 10px;
  background: #111;
  color: #fff;
  font-weight: 600;
}
.kw-act-chip button {
  background: none; border: none; cursor: pointer;
  color: #fff; font-size: 13px; line-height: 1; padding: 0; opacity: .5;
}
.kw-act-chip button:hover { opacity: 1; }
#kw-clear-all {
  font-size: 10px; color: var(--muted); background: none;
  border: none; cursor: pointer; padding: 3px 4px;
}
#kw-clear-all:hover { color: var(--text); }

/* Sidebar footer */
#sidebar-footer {
  margin-top: auto;
  padding: 10px 12px;
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
#stats { font-size: 11px; color: var(--muted); flex: 1; }
#size-toggle { display: flex; gap: 3px; }
#size-toggle button {
  font-size: 10px;
  padding: 3px 7px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  border-radius: 3px;
  transition: all .1s;
}
#size-toggle button.active { background: #111; color: #fff; border-color: #111; }

/* ── Main area ───────────────────────────────────────────────────── */
#main { flex: 1; overflow-y: auto; background: var(--bg); }
#grid {
  display: grid;
  gap: 8px;
  padding: 12px;
  grid-template-columns: repeat(auto-fill, minmax(var(--card-size, 240px), 1fr));
}

/* Cards */
.card {
  position: relative;
  background: var(--surface);
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 1px 3px rgba(0,0,0,.07);
  transition: box-shadow .15s, transform .15s;
}
.card:hover { box-shadow: 0 6px 18px rgba(0,0,0,.12); transform: translateY(-1px); }
.card-img-wrap {
  position: relative;
  overflow: hidden;
}
.card-img-wrap img {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
  display: block;
}
.card-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, rgba(0,0,0,.75) 0%, rgba(0,0,0,.4) 50%, transparent 100%);
  opacity: 0;
  transition: opacity .18s;
  display: flex;
  align-items: flex-end;
  flex-wrap: wrap;
  gap: 3px 6px;
  padding: 20px 8px 8px;
}
.card:hover .card-overlay { opacity: 1; }
.card-kw {
  font-size: 9px;
  color: rgba(255,255,255,.88);
  font-weight: 500;
}
.card-footer {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 10px;
}
.model-name {
  font-size: 8px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: #fff;
  padding: 2px 6px;
  border-radius: 3px;
}

.empty { grid-column: 1/-1; padding: 80px; text-align: center; color: var(--muted); }

/* Lightbox */
#lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.92);
  z-index: 100;
}
#lightbox.open { display: flex; }
#lb-img-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 60px;
  position: relative;
  min-width: 0;
}
#lb-img { max-width: 100%; max-height: 85vh; object-fit: contain; border-radius: 3px; }
.lb-nav {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,.07);
  border: none; color: #fff; font-size: 22px;
  padding: 16px 12px; cursor: pointer; border-radius: 4px; transition: background .1s; z-index: 2;
}
.lb-nav:hover { background: rgba(255,255,255,.14); }
#lb-prev { left: 16px; }
#lb-next { right: 16px; }
#lb-panel {
  width: 220px; min-width: 220px;
  background: #1a1a1a;
  border-left: 1px solid #2a2a2a;
  display: flex; flex-direction: column;
  padding: 20px; gap: 18px; overflow-y: auto;
}
#lb-close {
  position: absolute; top: 14px; right: 236px;
  background: none; border: none; color: rgba(255,255,255,.4);
  font-size: 18px; cursor: pointer; z-index: 3;
}
#lb-close:hover { color: #fff; }
.lb-sec-label {
  font-size: 9px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: #555; margin-bottom: 8px;
}
#lb-model { font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; line-height: 1.2; }
#lb-brand { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: .08em; margin-top: 3px; }
#lb-subfolder { font-size: 11px; color: #444; margin-top: 2px; }
#lb-kws { display: flex; flex-wrap: wrap; gap: 5px; }
.lb-kw {
  font-size: 11px; padding: 4px 9px; border-radius: 4px;
  background: #252525; color: #888; border: 1px solid #333;
  cursor: pointer; transition: all .1s;
}
.lb-kw:hover { background: #fff; color: #111; border-color: #fff; }
#lb-filename { font-size: 10px; color: #444; word-break: break-all; line-height: 1.5; }
#lb-download {
  font-size: 11px; padding: 9px 12px; border-radius: 5px;
  border: 1px solid #2a2a2a; background: #222; color: #aaa;
  cursor: pointer; width: 100%; text-align: center; margin-top: auto;
  text-decoration: none; display: block; transition: all .1s;
}
#lb-download:hover { background: #fff; color: #111; border-color: #fff; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="brand-row">
    <div id="brand-toggle">
      <button id="btn-toyota" class="active" onclick="setBrand('toyota')">Toyota</button>
      <button id="btn-lexus" onclick="setBrand('lexus')">Lexus</button>
    </div>
    <button id="reset-all" onclick="resetAll()">Reset all filters</button>
  </div>

  <!-- Model (both brands) -->
  <div class="facc" id="facc-model">
    <div class="facc-head" onclick="toggleFacc('facc-model')">
      <span class="facc-label">Model</span>
      <span class="facc-summary none" id="sum-model">All</span>
      <span class="facc-arrow">›</span>
    </div>
    <div class="facc-body"><div id="f-model" class="filter-group"></div></div>
  </div>

  <!-- Toyota filters -->
  <div id="toyota-filters">
    <div class="facc" id="facc-year">
      <div class="facc-head" onclick="toggleFacc('facc-year')">
        <span class="facc-label">Year</span>
        <span class="facc-summary none" id="sum-year">All</span>
        <span class="facc-arrow">›</span>
      </div>
      <div class="facc-body"><div id="f-year" class="filter-group"></div></div>
    </div>
    <div class="facc" id="facc-ttype">
      <div class="facc-head" onclick="toggleFacc('facc-ttype')">
        <span class="facc-label">Type</span>
        <span class="facc-summary none" id="sum-ttype">All</span>
        <span class="facc-arrow">›</span>
      </div>
      <div class="facc-body"><div id="f-tag" class="filter-group"></div></div>
    </div>
    <div class="facc" id="facc-lifestyle" style="display:none">
      <div class="facc-head" onclick="toggleFacc('facc-lifestyle')">
        <span class="facc-label">Lifestyle</span>
        <span class="facc-summary none" id="sum-lifestyle">All</span>
        <span class="facc-arrow">›</span>
      </div>
      <div class="facc-body"><div id="f-category" class="filter-group"></div></div>
    </div>
  </div>

  <!-- Lexus filters -->
  <div id="lexus-filters" style="display:none">
    <div class="facc" id="facc-ltype">
      <div class="facc-head" onclick="toggleFacc('facc-ltype')">
        <span class="facc-label">Type</span>
        <span class="facc-summary none" id="sum-ltype">All</span>
        <span class="facc-arrow">›</span>
      </div>
      <div class="facc-body"><div id="f-type" class="filter-group"></div></div>
    </div>
    <div class="facc" id="facc-ltrim" style="display:none">
      <div class="facc-head" onclick="toggleFacc('facc-ltrim')">
        <span class="facc-label">Trim</span>
        <span class="facc-summary none" id="sum-ltrim">All</span>
        <span class="facc-arrow">›</span>
      </div>
      <div class="facc-body"><div id="f-trim" class="filter-group"></div></div>
    </div>
    <div class="facc" id="facc-lcat" style="display:none">
      <div class="facc-head" onclick="toggleFacc('facc-lcat')">
        <span class="facc-label">Category</span>
        <span class="facc-summary none" id="sum-lcat">All</span>
        <span class="facc-arrow">›</span>
      </div>
      <div class="facc-body"><div id="f-gallery-cat" class="filter-group"></div></div>
    </div>
    <div class="facc" id="facc-lpeople" style="display:none">
      <div class="facc-head" onclick="toggleFacc('facc-lpeople')">
        <span class="facc-label">People</span>
        <span class="facc-summary none" id="sum-lpeople">All</span>
        <span class="facc-arrow">›</span>
      </div>
      <div class="facc-body"><div id="f-lexus-people" class="filter-group"></div></div>
    </div>
  </div>

  <!-- AI Search -->
  <div class="facc open" id="facc-ai">
    <div class="facc-head" onclick="toggleFacc('facc-ai')">
      <span class="facc-label">AI Search</span>
      <span class="facc-summary none" id="sum-ai"></span>
      <span class="facc-arrow">›</span>
    </div>
    <div class="facc-body col" id="ai-body">
      <div id="kw-input-wrap">
        <input id="kw-search" type="search" placeholder="Type a keyword…" oninput="onKwInput()" onblur="setTimeout(hideDropdown,150)">
        <div id="kw-dropdown"></div>
      </div>
      <div id="kw-mode-toggle">
        <button id="kw-or" class="active" onclick="setKwMode('or')">OR</button>
        <button id="kw-and" onclick="setKwMode('and')">AND</button>
      </div>
      <div id="kw-cloud"></div>
      <div id="kw-active-row"></div>
    </div>
  </div>

  <div id="sidebar-footer">
    <span id="stats"></span>
    <div id="size-toggle">
      <button onclick="setSize(180)" id="sz-s">S</button>
      <button onclick="setSize(240)" id="sz-m" class="active">M</button>
      <button onclick="setSize(340)" id="sz-l">L</button>
    </div>
  </div>
</div>

<div id="main">
  <div id="grid"><div class="empty">Loading…</div></div>
</div>

<div id="lightbox">
  <button id="lb-close" onclick="closeLightbox()">✕</button>
  <div id="lb-img-area">
    <button class="lb-nav" id="lb-prev" onclick="lbNav(-1)">‹</button>
    <img id="lb-img" src="" alt="">
    <button class="lb-nav" id="lb-next" onclick="lbNav(1)">›</button>
  </div>
  <div id="lb-panel">
    <div>
      <div class="lb-sec-label">Vehicle</div>
      <div id="lb-model"></div>
      <div id="lb-brand"></div>
      <div id="lb-subfolder"></div>
    </div>
    <div>
      <div class="lb-sec-label">Keywords — click to filter</div>
      <div id="lb-kws"></div>
    </div>
    <div>
      <div class="lb-sec-label">File</div>
      <div id="lb-filename"></div>
    </div>
    <a id="lb-download" download>Download image</a>
  </div>
</div>

<script>
let items = [], currentBrand = 'toyota', visibleItems = [], lbIndex = 0;
let activeModels = new Set(), activeYears = new Set(), activeTags = new Set(), activeCategories = new Set();
let lexusModels = new Set(), lexusType = null, lexusTrim = null, lexusCat = null, lexusPeopleTags = new Set();
let activeKeywords = new Set(), kwMode = 'or', kwEntries = [];

const MODEL_PALETTE = [
  '#e74c3c','#e67e22','#f39c12','#27ae60','#16a085',
  '#2980b9','#8e44ad','#c0392b','#d35400','#1abc9c',
  '#2ecc71','#3498db','#9b59b6','#e91e63','#00897b',
  '#f57f17','#558b2f','#1565c0','#6a1b9a','#4e342e'
];
function modelColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffff;
  return MODEL_PALETTE[h % MODEL_PALETTE.length];
}

// ── Accordion ────────────────────────────────────────────────────
function toggleFacc(id) {
  document.getElementById(id).classList.toggle('open');
}

function setSum(id, val) {
  const el = document.getElementById(id);
  if (!el) return;
  const empty = !val || val === 'All';
  el.textContent = val || 'All';
  el.className = 'facc-summary' + (empty ? ' none' : '');
}

function sumFromSet(set) { return set.size ? [...set].join(' · ') : null; }
function sumFromVal(v)   { return v || null; }

// ── Size ─────────────────────────────────────────────────────────
function setSize(px) {
  document.getElementById('grid').style.setProperty('--card-size', px + 'px');
  document.querySelectorAll('#size-toggle button').forEach(b => b.classList.remove('active'));
  const map = {180:'sz-s', 240:'sz-m', 340:'sz-l'};
  if (map[px]) document.getElementById(map[px]).classList.add('active');
}

// ── Reset all ─────────────────────────────────────────────────────
function resetAll() {
  activeModels.clear(); activeYears.clear(); activeTags.clear(); activeCategories.clear();
  lexusModels.clear(); lexusType = null; lexusTrim = null; lexusCat = null; lexusPeopleTags.clear();
  activeKeywords.clear(); kwMode = 'or';
  document.getElementById('kw-or').classList.add('active');
  document.getElementById('kw-and').classList.remove('active');
  document.getElementById('kw-search').value = '';
  hideDropdown();
  if (currentBrand === 'lexus') rebuildLexusFilters();
  else rebuildToyotaFilters();
  buildKwCloud();
  render();
}

// ── Brand ─────────────────────────────────────────────────────────
function setBrand(brand) {
  currentBrand = brand;
  document.getElementById('btn-lexus').classList.toggle('active', brand === 'lexus');
  document.getElementById('btn-toyota').classList.toggle('active', brand === 'toyota');
  document.getElementById('toyota-filters').style.display = brand === 'toyota' ? '' : 'none';
  document.getElementById('lexus-filters').style.display  = brand === 'lexus'  ? '' : 'none';
  activeModels.clear(); activeYears.clear(); activeTags.clear(); activeCategories.clear();
  lexusModels.clear(); lexusType = null; lexusTrim = null; lexusCat = null; lexusPeopleTags.clear();
  activeKeywords.clear(); kwMode = 'or';
  document.getElementById('kw-or').classList.add('active');
  document.getElementById('kw-and').classList.remove('active');
  document.getElementById('kw-search').value = '';
  hideDropdown();
  document.getElementById('grid').innerHTML = '<div class="empty">Loading…</div>';
  loadManifest(brand);
}

function loadManifest(brand) {
  const path = brand === 'lexus' ? 'Lexus/manifest.json' : 'Toyota/manifest.json';
  fetch(path)
    .then(r => r.json())
    .then(data => {
      items = Object.values(data).map(item => ({
        ...item,
        models: item.models || (item.model ? [item.model] : ['unknown']),
        autoTags: autoTags(item),
      }));
      if (brand === 'lexus') rebuildLexusFilters();
      else rebuildToyotaFilters();
      buildKwCloud();
      render();
    })
    .catch(() => {
      document.getElementById('grid').innerHTML = '<div class="empty">Could not load manifest — open via a local server.</div>';
    });
}

// ── Toyota ───────────────────────────────────────────────────────
function rebuildToyotaFilters() {
  const allModels  = [...new Set(items.flatMap(i => i.models))].sort();
  const allTagsRaw = [...new Set(items.flatMap(i => i.autoTags||[]))];
  const allYears   = allTagsRaw.filter(t => /^MY\d{2}$/.test(t)).sort();
  const allFilters = allTagsRaw.filter(t => !/^MY\d{2}$/.test(t)).sort();
  const allCats    = [...new Set(items.flatMap(i => i.tags||[]))].sort();

  const fm=document.getElementById('f-model'), fy=document.getElementById('f-year'),
        ft=document.getElementById('f-tag'),   fc=document.getElementById('f-category');
  fm.innerHTML=''; fy.innerHTML=''; ft.innerHTML=''; fc.innerHTML='';

  makeAllPill(fm, activeModels, 'pill-all-model', () => { setSum('sum-model', null); render(); });
  allModels.forEach(m => makePill(m.toUpperCase(), activeModels, m, fm, 'pill-all-model', () => setSum('sum-model', sumFromSet(activeModels))));
  makeAllPill(fy, activeYears, 'pill-all-year', () => { setSum('sum-year', null); render(); });
  allYears.forEach(y => makePill(y, activeYears, y, fy, 'pill-all-year', () => setSum('sum-year', sumFromSet(activeYears))));
  if (allFilters.length) {
    makeAllPill(ft, activeTags, 'pill-all-ttype', () => { setSum('sum-ttype', null); render(); });
    allFilters.forEach(t => makePill(cap(t), activeTags, t, ft, 'pill-all-ttype', () => setSum('sum-ttype', sumFromSet(activeTags))));
  }
  const hasLife = allCats.length > 0;
  document.getElementById('facc-lifestyle').style.display = hasLife ? '' : 'none';
  if (hasLife) {
    makeAllPill(fc, activeCategories, 'pill-all-cat', () => { setSum('sum-lifestyle', null); render(); });
    allCats.forEach(c => makePill(cap(c), activeCategories, c, fc, 'pill-all-cat', () => setSum('sum-lifestyle', sumFromSet(activeCategories))));
  }
}

// ── Lexus ────────────────────────────────────────────────────────
function rebuildLexusFilters() {
  const allModels = [...new Set(items.flatMap(i => i.models))].sort();
  const fm = document.getElementById('f-model');
  fm.innerHTML = '';
  makeAllPill(fm, lexusModels, 'pill-all-lmodel', () => {
    lexusType=null; lexusTrim=null; lexusCat=null;
    setSum('sum-model', null); rebuildLexusDynamic(); render();
  });
  allModels.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'pill' + (lexusModels.has(m) ? ' active' : '');
    btn.textContent = m.toUpperCase().replace('-',' ');
    btn.onclick = () => {
      if (lexusModels.has(m)) lexusModels.delete(m); else lexusModels.add(m);
      btn.classList.toggle('active', lexusModels.has(m));
      syncAllPill('pill-all-lmodel', lexusModels);
      setSum('sum-model', sumFromSet(lexusModels));
      lexusTrim=null; lexusCat=null; rebuildLexusDynamic(); render();
    };
    fm.appendChild(btn);
  });
  rebuildLexusDynamic();
}

function rebuildLexusDynamic() {
  const mi = lexusModels.size ? items.filter(i => i.models.some(m => lexusModels.has(m))) : items;

  const ft = document.getElementById('f-type');
  ft.innerHTML = '';
  const allTypeBtn = document.createElement('button');
  allTypeBtn.className = 'pill' + (!lexusType ? ' active' : '');
  allTypeBtn.textContent = 'All';
  allTypeBtn.onclick = () => { lexusType=null; lexusTrim=null; lexusCat=null; setSum('sum-ltype',null); rebuildLexusDynamic(); render(); };
  ft.appendChild(allTypeBtn);
  ['hero','gallery','design'].forEach(type => {
    if (!mi.some(i => type==='design'?(i.subfolder||'').startsWith('design'):i.subfolder===type)) return;
    const btn = document.createElement('button');
    btn.className = 'pill' + (lexusType===type ? ' active' : '');
    btn.textContent = cap(type);
    btn.onclick = () => {
      lexusType = lexusType===type ? null : type; lexusTrim=null; lexusCat=null;
      setSum('sum-ltype', sumFromVal(lexusType));
      rebuildLexusDynamic(); render();
    };
    ft.appendChild(btn);
  });

  // Trim
  const showTrim = lexusType==='design' || lexusType===null;
  const allTrims = [...new Set(mi.filter(i=>(i.subfolder||'').startsWith('design/')).map(i=>i.subfolder.replace('design/','')))].filter(t=>t!=='design').sort();
  const faccLtrim = document.getElementById('facc-ltrim'), ftr = document.getElementById('f-trim');
  if (showTrim && allTrims.length) {
    faccLtrim.style.display = '';
    ftr.innerHTML = '';
    const ab = document.createElement('button'); ab.className='pill'+((!lexusTrim)?' active':''); ab.textContent='All';
    ab.onclick=()=>{lexusTrim=null;setSum('sum-ltrim',null);rebuildLexusDynamic();render();}; ftr.appendChild(ab);
    allTrims.forEach(trim => {
      const btn=document.createElement('button'); btn.className='pill'+(lexusTrim===trim?' active':''); btn.textContent=cap(trim);
      btn.onclick=()=>{lexusTrim=lexusTrim===trim?null:trim;if(lexusTrim)lexusType='design';setSum('sum-ltrim',sumFromVal(lexusTrim));rebuildLexusDynamic();render();}; ftr.appendChild(btn);
    });
  } else { faccLtrim.style.display='none'; ftr.innerHTML=''; lexusTrim=null; }

  // Category
  const showCat = lexusType==='gallery'||lexusType===null;
  const allCats = [...new Set(mi.filter(i=>i.subfolder==='gallery').map(i=>effectiveCategory(i)).filter(Boolean))].sort();
  const faccLcat = document.getElementById('facc-lcat'), fgc = document.getElementById('f-gallery-cat');
  if (showCat && allCats.length) {
    faccLcat.style.display = '';
    fgc.innerHTML = '';
    const ab=document.createElement('button'); ab.className='pill'+((!lexusCat)?' active':''); ab.textContent='All';
    ab.onclick=()=>{lexusCat=null;setSum('sum-lcat',null);rebuildLexusDynamic();render();}; fgc.appendChild(ab);
    allCats.forEach(cat => {
      const btn=document.createElement('button'); btn.className='pill'+(lexusCat===cat?' active':''); btn.textContent=cap(cat);
      btn.onclick=()=>{lexusCat=lexusCat===cat?null:cat;if(lexusCat)lexusType='gallery';setSum('sum-lcat',sumFromVal(lexusCat));rebuildLexusDynamic();render();}; fgc.appendChild(btn);
    });
  } else { faccLcat.style.display='none'; fgc.innerHTML=''; lexusCat=null; }

  // People
  const allPeople = [...new Set(mi.flatMap(i=>i.tags||[]))].sort();
  const faccLp = document.getElementById('facc-lpeople'), fp = document.getElementById('f-lexus-people');
  if (allPeople.length) {
    faccLp.style.display = '';
    fp.innerHTML = '';
    makeAllPill(fp, lexusPeopleTags, 'pill-all-lpeople', ()=>{lexusPeopleTags.clear();setSum('sum-lpeople',null);render();});
    allPeople.forEach(tag => {
      const btn=document.createElement('button'); btn.className='pill'+(lexusPeopleTags.has(tag)?' active':''); btn.textContent=cap(tag);
      btn.onclick=()=>{
        if(lexusPeopleTags.has(tag))lexusPeopleTags.delete(tag);else lexusPeopleTags.add(tag);
        btn.classList.toggle('active',lexusPeopleTags.has(tag));
        syncAllPill('pill-all-lpeople',lexusPeopleTags);
        setSum('sum-lpeople',sumFromSet(lexusPeopleTags));
        render();
      };
      fp.appendChild(btn);
    });
  } else { faccLp.style.display='none'; fp.innerHTML=''; lexusPeopleTags.clear(); }
}

// ── Shared helpers ────────────────────────────────────────────────
function makeAllPill(container, set, id, onClear) {
  const btn = document.createElement('button');
  btn.className = 'pill active'; btn.id = id; btn.textContent = 'All';
  btn.onclick = () => {
    set.clear();
    container.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    if (onClear) onClear(); else render();
  };
  container.appendChild(btn);
}
function syncAllPill(id, set) { const b=document.getElementById(id); if(b)b.classList.toggle('active',set.size===0); }
function makePill(label, set, key, container, allId, onUpdate) {
  const btn = document.createElement('button'); btn.className='pill'; btn.textContent=label;
  btn.onclick = () => {
    if(set.has(key))set.delete(key);else set.add(key);
    btn.classList.toggle('active',set.has(key));
    if(allId)syncAllPill(allId,set);
    if(onUpdate)onUpdate();
    render();
  };
  container.appendChild(btn);
}

function autoTags(item) {
  const fn=(item.filename||'').toLowerCase(),url=(item.url||'').toLowerCase(),sub=item.subfolder||'',cat=(item.category||'').toLowerCase();
  const tags=[];
  if(/interior/i.test(fn)||url.includes('/interior/')||cat==='interior')tags.push('interior');
  if(/exterior/i.test(fn)||url.includes('/exterior/')||cat==='exterior')tags.push('exterior');
  if(sub==='hero'||/hero/i.test(fn))tags.push('hero');
  if(sub.startsWith('design')){tags.push('design');const trim=sub.replace('design/','');if(trim&&trim!=='design')tags.push(trim);}
  if(/wheels/i.test(fn)||url.includes('/wheels/'))tags.push('wheels');
  const m=fn.match(/my(\d{2})/i);if(m)tags.push('MY'+m[1]);
  return [...new Set(tags)];
}
function effectiveCategory(item) {
  if(item.category)return item.category;
  const a=item.autoTags||[];
  return a.includes('interior')?'interior':a.includes('exterior')?'exterior':null;
}
function localUrl(item) {
  const dir=(item.brand||currentBrand)==='lexus'?'Lexus':'Toyota';
  return `${dir}/library/${(item.models||[item.model])[0]}/${item.subfolder}/${item.filename}`;
}
function thumbUrl(item) {
  const dir=(item.brand||currentBrand)==='lexus'?'Lexus':'Toyota';
  return `${dir}/library/${(item.models||[item.model])[0]}/${item.subfolder}/thumbs/${item.filename}`;
}
function cap(s){return s.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());}

// ── Keyword cloud ─────────────────────────────────────────────────
function buildKwCloud() {
  const counts={};
  for(const item of items) for(const kw of(item.keywords||[])){const k=kw.trim().toLowerCase();if(k)counts[k]=(counts[k]||0)+1;}
  const entries=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  kwEntries=entries.map(([kw,count])=>({kw,count}));
  const max=entries[0]?.[1]||1;
  const bands=['kw-b1','kw-b2','kw-b3','kw-b4','kw-b5','kw-b6','kw-b7'];
  const cloud=document.getElementById('kw-cloud');
  cloud.innerHTML=''; cloud._chips=[];
  for(const [kw,count] of entries){
    const r=count/max;
    const bi=r>=.6?0:r>=.4?1:r>=.25?2:r>=.15?3:r>=.08?4:r>=.04?5:6;
    const chip=document.createElement('span');
    chip.className='kw-chip '+bands[bi]+(activeKeywords.has(kw)?' active':'');
    chip.dataset.kw=kw; chip.dataset.total=count;
    chip.innerHTML=`${kw} <span class="kc">${count}</span>`;
    chip.onclick=()=>toggleKw(kw);
    chip.addEventListener('mouseenter',()=>{
      const base=items.filter(i=>matchesWithoutKw(i));
      chip.querySelector('.kc').textContent=base.filter(i=>(i.keywords||[]).map(k=>k.toLowerCase()).includes(kw)).length;
    });
    chip.addEventListener('mouseleave',()=>{ chip.querySelector('.kc').textContent=count; });
    cloud.appendChild(chip); cloud._chips.push(chip);
  }
  syncKwActiveRow();
}

function onKwInput() {
  const q=document.getElementById('kw-search').value.trim().toLowerCase();
  if(!q){hideDropdown();return;}
  const escaped=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const hits=kwEntries.filter(e=>e.kw.includes(q)&&!activeKeywords.has(e.kw)).slice(0,8);
  if(!hits.length){hideDropdown();return;}
  const dd=document.getElementById('kw-dropdown');
  dd.innerHTML='';
  hits.forEach(({kw,count})=>{
    const div=document.createElement('div'); div.className='kw-dd-item';
    const hl=kw.replace(new RegExp(`(${escaped})`,'gi'),'<mark>$1</mark>');
    div.innerHTML=`<span>${hl}</span><span class="kw-dd-count">${count}</span>`;
    div.onmousedown=e=>{e.preventDefault();selectKw(kw);};
    dd.appendChild(div);
  });
  dd.classList.add('open');
}
function hideDropdown(){document.getElementById('kw-dropdown').classList.remove('open');}
function selectKw(kw){
  document.getElementById('kw-search').value=''; hideDropdown();
  if(!activeKeywords.has(kw)){
    activeKeywords.add(kw);
    for(const c of(document.getElementById('kw-cloud')._chips||[])){if(c.dataset.kw===kw)c.classList.add('active');}
    syncKwActiveRow(); render();
  }
}

function toggleKw(kw){
  if(activeKeywords.has(kw))activeKeywords.delete(kw);else activeKeywords.add(kw);
  for(const c of(document.getElementById('kw-cloud')._chips||[])){if(c.dataset.kw===kw)c.classList.toggle('active',activeKeywords.has(kw));}
  syncKwActiveRow(); render();
}
function removeKw(kw){
  activeKeywords.delete(kw);
  for(const c of(document.getElementById('kw-cloud')._chips||[])){if(c.dataset.kw===kw)c.classList.remove('active');}
  syncKwActiveRow(); render();
}
function syncKwActiveRow(){
  const row=document.getElementById('kw-active-row');
  const sumEl=document.getElementById('sum-ai');
  setSum('sum-ai', activeKeywords.size ? [...activeKeywords].join(' · ') : null);
  row.innerHTML='';
  if(!activeKeywords.size)return;
  for(const kw of activeKeywords){
    const chip=document.createElement('span'); chip.className='kw-act-chip';
    const safe=kw.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    chip.innerHTML=`${kw} <button onclick="removeKw('${safe}')">×</button>`;
    row.appendChild(chip);
  }
  const clr=document.createElement('button'); clr.id='kw-clear-all'; clr.textContent='Clear all';
  clr.onclick=()=>{activeKeywords.clear();buildKwCloud();render();}; row.appendChild(clr);
}

function setKwMode(mode){
  kwMode=mode;
  document.getElementById('kw-and').classList.toggle('active',mode==='and');
  document.getElementById('kw-or').classList.toggle('active',mode==='or');
  if(activeKeywords.size)render();
}

// ── Matching ──────────────────────────────────────────────────────
function matchesToyota(item){
  if(activeModels.size&&!item.models.some(m=>activeModels.has(m)))return false;
  const a=item.autoTags||[],t=item.tags||[];
  if(activeYears.size&&![...activeYears].some(y=>a.includes(y)))return false;
  if(activeTags.size&&![...activeTags].every(x=>a.includes(x)))return false;
  if(activeCategories.size&&![...activeCategories].some(c=>t.includes(c)))return false;
  return true;
}
function matchesLexus(item){
  if(lexusModels.size&&!item.models.some(m=>lexusModels.has(m)))return false;
  const sub=item.subfolder||'';
  if(lexusType){if(lexusType==='design'){if(!sub.startsWith('design'))return false;}else{if(sub!==lexusType)return false;}}
  if(lexusTrim&&sub!=='design/'+lexusTrim)return false;
  if(lexusCat&&effectiveCategory(item)!==lexusCat)return false;
  if(lexusPeopleTags.size&&![...lexusPeopleTags].every(t=>(item.tags||[]).includes(t)))return false;
  return true;
}
function matchesKw(item){
  if(!activeKeywords.size)return true;
  const kws=(item.keywords||[]).map(k=>k.toLowerCase());
  return kwMode==='or'?[...activeKeywords].some(k=>kws.includes(k)):[...activeKeywords].every(k=>kws.includes(k));
}
function matchesWithoutKw(item){return currentBrand==='lexus'?matchesLexus(item):matchesToyota(item);}
function matches(item){return matchesKw(item)&&matchesWithoutKw(item);}

// ── Render ────────────────────────────────────────────────────────
function render(){
  visibleItems=items.filter(matches);
  document.getElementById('stats').textContent=`${visibleItems.length} / ${items.length}`;
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  if(!visibleItems.length){grid.innerHTML='<div class="empty">No images match.</div>';return;}
  visibleItems.forEach((item,idx)=>{
    const kws=(item.keywords||[]);
    const color=modelColor(item.models[0]||'unknown');
    const year=(item.autoTags||[]).find(t=>/^MY\d{2}$/.test(t))||'';
    const modelLabel=item.models.join(' · ').toUpperCase().replace(/-/g,' ')+(year?' — '+year:'');
    const card=document.createElement('div'); card.className='card';
    card.innerHTML=`
      <div class="card-img-wrap">
        <img src="${thumbUrl(item)}" alt="${item.filename}" loading="lazy">
        <div class="card-overlay">${kws.map(k=>`<span class="card-kw">${k}</span>`).join('')}</div>
      </div>
      <div class="card-footer">
        <span class="model-name" style="background:${color}">${modelLabel}</span>
      </div>`;
    card.onclick=()=>openLightbox(idx);
    grid.appendChild(card);
  });
}

// ── Lightbox ──────────────────────────────────────────────────────
function openLightbox(idx){lbIndex=idx;showLbItem();document.getElementById('lightbox').classList.add('open');}
function showLbItem(){
  const item=visibleItems[lbIndex]; if(!item)return;
  document.getElementById('lb-img').src=localUrl(item);
  const lbm=document.getElementById('lb-model');
  lbm.textContent=item.models.join(' · ').toUpperCase().replace(/-/g,' ');
  lbm.style.color=modelColor(item.models[0]||'unknown');
  document.getElementById('lb-brand').textContent=(item.brand||currentBrand).toUpperCase();
  document.getElementById('lb-subfolder').textContent=item.subfolder||'';
  document.getElementById('lb-filename').textContent=item.filename;
  const dl=document.getElementById('lb-download');
  dl.href=localUrl(item); dl.download=item.filename;
  document.getElementById('lb-kws').innerHTML=(item.keywords||[]).map(k=>{
    const safe=k.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<span class="lb-kw" onclick="addKwFromLb('${safe}')">${k}</span>`;
  }).join('');
}
function addKwFromLb(kw){
  activeKeywords.add(kw);
  for(const c of(document.getElementById('kw-cloud')._chips||[])){if(c.dataset.kw===kw)c.classList.add('active');}
  syncKwActiveRow();
  document.getElementById('facc-ai').classList.add('open');
}
function lbNav(dir){lbIndex=(lbIndex+dir+visibleItems.length)%visibleItems.length;showLbItem();}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');document.getElementById('lb-img').src='';render();}
document.getElementById('lightbox').addEventListener('click',e=>{if(e.target===e.currentTarget)closeLightbox();});
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lightbox').classList.contains('open'))return;
  if(e.key==='ArrowRight')lbNav(1);
  if(e.key==='ArrowLeft')lbNav(-1);
  if(e.key==='Escape')closeLightbox();
});

loadManifest('toyota');
</script>
