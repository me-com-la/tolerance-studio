<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Update Log — MLP Image Library</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background: #f0f0ee;
    color: #111;
    margin: 0;
    padding: 24px;
    font-size: 14px;
  }
  a.back { color: #555; text-decoration: none; font-size: 13px; }
  a.back:hover { text-decoration: underline; }
  h1 { font-size: 20px; margin: 10px 0 20px; }
  .entry {
    background: #fff;
    border: 1px solid #e0e0de;
    border-radius: 6px;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .entry-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .entry-date { font-weight: 600; font-size: 14px; }
  .entry-brand {
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: .5px;
    background: #eee;
    border-radius: 4px;
    padding: 2px 6px;
    color: #555;
  }
  .entry-counts { font-size: 12px; color: #555; }
  .entry-counts .added { color: #1a7f37; font-weight: 600; }
  .entry-counts .removed { color: #c0392b; font-weight: 600; }
  .entry-note { font-size: 12px; color: #777; font-style: italic; margin-bottom: 8px; }
  details { margin-top: 6px; }
  summary {
    cursor: pointer;
    font-size: 12px;
    color: #555;
    margin-bottom: 4px;
  }
  ul.filelist {
    margin: 4px 0 0 0;
    padding-left: 18px;
    font-size: 11px;
    color: #444;
    max-height: 220px;
    overflow-y: auto;
  }
  ul.filelist li { word-break: break-all; margin-bottom: 2px; }
  .empty-note { color: #999; font-style: italic; padding: 20px 0; }
</style>
</head>
<body>

<a class="back" href="index.html">&larr; Back to library</a>
<h1>Update Log</h1>
<div id="content"></div>

<script>
async function load() {
  const content = document.getElementById('content');
  let log;
  try {
    const res = await fetch('update_log.json');
    log = await res.json();
  } catch (e) {
    content.innerHTML = '<div class="empty-note">No update log yet.</div>';
    return;
  }

  if (!log.length) {
    content.innerHTML = '<div class="empty-note">No updates logged yet.</div>';
    return;
  }

  // Most recent first
  log.slice().reverse().forEach(entry => {
    const div = document.createElement('div');
    div.className = 'entry';

    const head = document.createElement('div');
    head.className = 'entry-head';
    head.innerHTML = `
      <span class="entry-date">${entry.date}</span>
      <span class="entry-brand">${entry.brand}</span>
      <span class="entry-counts">
        <span class="added">+${entry.added_count}</span> added,
        <span class="removed">-${entry.removed_count}</span> removed
      </span>`;
    div.appendChild(head);

    if (entry.note) {
      const note = document.createElement('div');
      note.className = 'entry-note';
      note.textContent = entry.note;
      div.appendChild(note);
    }

    if (entry.added_count) {
      div.appendChild(makeDetails(`+ ${entry.added_count} new image(s)`, entry.added));
    }
    if (entry.removed_count) {
      div.appendChild(makeDetails(`- ${entry.removed_count} removed image(s)`, entry.removed));
    }

    content.appendChild(div);
  });
}

function makeDetails(label, files) {
  const details = document.createElement('details');
  const summary = document.createElement('summary');
  summary.textContent = label;
  details.appendChild(summary);
  const ul = document.createElement('ul');
  ul.className = 'filelist';
  files.forEach(f => {
    const li = document.createElement('li');
    li.textContent = f;
    ul.appendChild(li);
  });
  details.appendChild(ul);
  return details;
}

load();
</script>
<!-- auth temporarily disabled, see auth.js <script src="auth.js"></script> -->
</body>
</html>
