<html lang="en">
<head>
<meta charset="utf-8">
<title>Santa-Barbara-July-2026 — Wingstudio review | Tolerance Studio</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#111014; --paper:#ffffff; --card:#ffffff;
  --line:rgba(17,16,20,.12); --line-2:rgba(17,16,20,.22);
  --muted:#5d5b57; --accent:#d8502d; --accent-ink:#7a2a14; --accent-wash:#fbeae3;
  --chip:#eceae6; --radius:14px;
  --font-display:'Barlow Condensed',sans-serif;
  --font-body:'IBM Plex Sans',system-ui,sans-serif;
  --font-mono:'IBM Plex Mono','Courier New',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--paper);color:var(--ink);font-family:var(--font-body);line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.topbar{background:#fff;border-bottom:1px solid var(--line)}
.topbar-in{max-width:88rem;margin:0 auto;padding:0 1.6rem;display:flex;align-items:center;justify-content:space-between;height:64px}
.brand{display:flex;align-items:center;gap:.5rem;font-family:var(--font-display);font-weight:700;font-size:1.1rem;text-transform:uppercase}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);display:inline-block}
.rail-wrap{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:60px;z-index:15}
.rail{max-width:88rem;margin:0 auto;padding:0 1.6rem;display:flex;overflow-x:auto}
.rail-step{display:flex;align-items:center;justify-content:center;flex:1;gap:.6rem;padding:.9rem 1.1rem;white-space:nowrap;border-bottom:3px solid transparent;cursor:pointer;color:var(--muted);font-size:.88rem;font-weight:500}
.rail-step .n{width:22px;height:22px;border-radius:50%;background:var(--chip);color:var(--muted);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:.72rem;font-weight:600}
.rail-step.done .n{background:#2e7d32;color:#fff}
.rail-step.active{color:var(--ink);border-bottom-color:var(--accent);font-weight:600}
.rail-step.active .n{background:var(--accent);color:#fff}

.hero{max-width:88rem;margin:0 auto;padding:2.4rem 1.6rem 1.6rem}
h1{font-family:var(--font-display);font-size:clamp(1.8rem,4vw,2.6rem);font-weight:700;text-transform:uppercase;letter-spacing:.01em;margin-bottom:.5rem}
.hero p{color:var(--muted);font-size:.95rem;max-width:56ch}

.toolbar{max-width:88rem;margin:0 auto;padding:0 1.6rem 1.6rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.8rem}
.count{font-size:.85rem;color:var(--muted)}
.btn{display:inline-flex;align-items:center;gap:.5rem;font-size:.88rem;font-weight:600;padding:.7rem 1.3rem;border-radius:10px;border:none;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .15s}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary{background:var(--ink);color:#fff}
.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line-2)}
.savebar{position:sticky;bottom:0;background:var(--paper);padding:1rem 0 0;display:flex;align-items:center;justify-content:flex-end;gap:.6rem}
.del-btn{position:absolute;top:.6rem;left:.6rem;width:2.1rem;height:2.1rem;border-radius:50%;background:rgba(255,255,255,.9);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.95rem;box-shadow:0 1px 4px rgba(17,16,20,.15);opacity:0;transition:opacity .15s}
.imgwrap:hover .del-btn{opacity:1}
.del-btn:hover{background:#a33;color:#fff}

.wrap{max-width:88rem;margin:0 auto;padding:0 1.6rem 4rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.2rem}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(17,16,20,.08)}
.card .imgwrap{aspect-ratio:4/3;background:#eee;overflow:hidden;position:relative}
.card img{width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in}
.fav-btn{position:absolute;top:.6rem;right:.6rem;width:2.1rem;height:2.1rem;border-radius:50%;background:rgba(255,255,255,.9);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;box-shadow:0 1px 4px rgba(17,16,20,.15)}
.fav-btn.on{color:var(--accent)}
.card .body{padding:.9rem 1rem 1.1rem;display:flex;flex-direction:column;gap:.6rem}
.fname{font-size:.78rem;color:var(--muted)}
.imgsize{font-size:.72rem;color:var(--muted);font-family:var(--font-mono)}
.comment{width:100%;border:1px solid var(--line-2);border-radius:8px;padding:.5rem .7rem;font-family:inherit;font-size:.82rem;resize:none;min-height:2.4rem}

.footnote{text-align:center;color:var(--muted);font-size:.82rem;padding:2rem 1.6rem 3rem}

/* ---------- lightbox: zoom + prev/next, ported as-is from tools/control.html ---------- */
#lightbox{position:fixed;inset:0;background:rgba(10,9,12,.92);display:none;align-items:center;justify-content:center;z-index:1000;user-select:none}
#lightbox .lb-stage{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden}
#lightbox img{max-width:90vw;max-height:88vh;object-fit:contain;cursor:zoom-in;transition:transform .08s ease-out;touch-action:none}
#lightbox img.zoomed{cursor:grab;transition:none}
#lightbox img.panning{cursor:grabbing}
#lightbox .lb-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);color:#fff;border:none;width:2.6rem;height:2.6rem;border-radius:50%;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
#lightbox .lb-btn:hover{background:rgba(255,255,255,.24)}
#lightbox .lb-prev{left:1rem}
#lightbox .lb-next{right:1rem}
#lightbox .lb-close{position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,.12);color:#fff;border:none;width:2.2rem;height:2.2rem;border-radius:50%;font-size:1.1rem;cursor:pointer}
#lightbox .lb-close:hover{background:rgba(255,255,255,.24)}
#lightbox .lb-counter{position:absolute;top:1.1rem;left:1rem;color:#eee;font-size:.8rem;background:rgba(255,255,255,.12);border-radius:6px;padding:.25rem .55rem}
#lightbox .lb-open-orig{position:absolute;bottom:1rem;left:50%;transform:translateX(-50%);color:#eee;font-size:.75rem;background:rgba(255,255,255,.12);border-radius:6px;padding:.3rem .7rem;text-decoration:none}
#lightbox .lb-open-orig:hover{background:rgba(255,255,255,.24)}
#lightbox .lb-hint{position:absolute;bottom:1rem;right:1rem;color:#999;font-size:.68rem}
.imgwrap img.lb-thumb{cursor:pointer}
</style>
</head>
<body>
<div class="topbar"><div class="topbar-in">
  <a class="brand" href="2-project-list.html" style="text-decoration:none" title="All projects"><img src="../images/ts-logo.png" alt="" style="height:17px;width:auto;display:block;">Pro</a>
  <div class="crumbs"><a href="2-project-list.html">Projects</a><span>/</span><a href="#" id="crumb-proj">…</a><span>/</span><span class="cur">Review</span></div>
  <div class="who"><span>Owner</span><div class="avatar">O</div></div>
</div></div>

<div class="rail-wrap"><div class="rail">
  <div class="rail-step done" onclick="location.href='4-tags-editor.html?project='+encodeURIComponent(qs('project'))"><span class="n">✓</span>Brief / Tags</div>
  <div class="rail-step done" onclick="location.href='5-scenes-editor.html?project='+encodeURIComponent(qs('project'))"><span class="n">✓</span>Scenes</div>
  <div class="rail-step done" onclick="location.href='6-checker-gallery.html?project='+encodeURIComponent(qs('project'))"><span class="n">✓</span>Check</div>
  <div class="rail-step done" onclick="location.href='8-compose.html?project='+encodeURIComponent(qs('project'))"><span class="n">✓</span>Compose</div>
  <div class="rail-step active"><span class="n">5</span>Review</div>
</div></div>

<div class="hero">
  <h1 id="proj-title">…</h1>
</div>

<div class="toolbar">
  <span class="count" id="img-count"></span>
</div>

<div class="wrap">
  <div class="grid" id="grid"></div>

  <div class="savebar">
    <a class="btn btn-ghost" id="email-link-btn" style="display:none">✉ Email</a>
    <button class="btn btn-primary" onclick="downloadZip()">⬇ Download all as zip</button>
  </div>
</div>


<div id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <div class="lb-stage" onclick="if(event.target===this)closeLightbox()">
    <button class="lb-btn lb-prev" onclick="lbNext(-1)">‹</button>
    <img id="lb-img">
    <button class="lb-btn lb-next" onclick="lbNext(1)">›</button>
  </div>
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <div class="lb-counter" id="lb-counter"></div>
  <a class="lb-open-orig" id="lb-open-orig" target="_blank" rel="noopener">⤢ open original</a>
  <div class="lb-hint">click image to zoom · scroll to zoom · drag to pan · ← → to navigate · esc to close</div>
</div>
<script>
// Review gallery — shows composed + approved images for a project.

function qs(k){ return new URLSearchParams(location.search).get(k); }
function esc(s){ const d=document.createElement('div'); d.textContent=s??''; return d.innerHTML; }
const projectId = qs('project');

// Bucket is private, so getPublicUrl() 403s — every image needs a signed URL
// from the authenticated client. Cached per path across re-renders.
const signedUrlCache = {};
async function resolveSignedUrls(rs){
  await Promise.all(rs.map(async r => {
    if (!r.storage_path || signedUrlCache[r.storage_path]) return;
    try { signedUrlCache[r.storage_path] = await db.getSignedUrl(r.storage_path); }
    catch (e) { signedUrlCache[r.storage_path] = ''; }
  }));
}

async function toggleFav(renderId){
  const r = renders.find(x => x.id === renderId);
  if (!r) return;
  const next = !r.is_favorite;
  r.is_favorite = next;
  render();
  const { error } = await sb.from('renders').update({ is_favorite: next }).eq('id', renderId);
  if (error) { r.is_favorite = !next; render(); }
}

// Image size label (replicated from Standard's review page): pixel
// dimensions come free from the <img> once loaded; file size needs a HEAD
// request against the same signed URL (Content-Length), cached per path.
const fileSizeCache = {};
function formatBytes(bytes){
  if (!bytes) return '';
  if (bytes < 1024*1024) return `${(bytes/1024).toFixed(0)}KB`;
  return `${(bytes/(1024*1024)).toFixed(1)}MB`;
}
function renderImageSize(renderId, dims, sizeText){
  const el = document.getElementById(`imgsize-${renderId}`);
  if (!el) return;
  el.textContent = [dims, sizeText].filter(Boolean).join(' · ');
}
async function reportImageDims(img, renderId){
  const dims = `${img.naturalWidth}×${img.naturalHeight}`;
  renderImageSize(renderId, dims, fileSizeCache[img.src]);
  if (!(img.src in fileSizeCache)) {
    try {
      const res = await fetch(img.src, { method: 'HEAD' });
      const len = parseInt(res.headers.get('Content-Length') || '0', 10);
      fileSizeCache[img.src] = formatBytes(len);
    } catch (e) { fileSizeCache[img.src] = ''; }
    renderImageSize(renderId, dims, fileSizeCache[img.src]);
  }
}

// Delete a delivered image — same pattern as the Select gallery. RLS only
// lets the Owner actually remove rows/files; a client visitor's click
// surfaces as a permission error rather than deleting anything.
async function deleteRenderInline(event, renderId, storagePath){
  event.stopPropagation();
  if (!confirm('Delete this image? This cannot be undone.')) return;
  try {
    if (storagePath) await db.removeFiles([storagePath]);
    const { error } = await sb.from('renders').delete().eq('id', renderId);
    if (error) throw error;
    renders = renders.filter(x => x.id !== renderId);
    await render();
  } catch (e) { alert('Delete failed: ' + (e.message || e)); }
}

function wireEmailLinkButton(project){
  const url = location.href;
  const subject = `${project.name} — ready for your review`;
  const body = `Hi,\n\nYour images for "${project.name}" are ready to review and download:\n${url}\n\nThanks!`;
  const btn = document.getElementById('email-link-btn');
  btn.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  btn.style.display = '';
}

let renders = [];
async function render(){
  await resolveSignedUrls(renders);
  document.getElementById('img-count').textContent = `${renders.length} image${renders.length===1?'':'s'}`;
  document.getElementById('grid').innerHTML = renders.map(r => {
    const url = signedUrlCache[r.storage_path] || '';
    return `<div class="card">
      <div class="imgwrap">
        <img class="lb-thumb" src="${esc(url)}" onclick="openLightbox(this)" onload="reportImageDims(this,'${r.id}')">
        <button class="fav-btn ${r.is_favorite?'on':''}" onclick="toggleFav('${r.id}')">${r.is_favorite?'♥':'♡'}</button>
        <button class="del-btn" title="Delete" onclick="deleteRenderInline(event,'${r.id}','${esc(r.storage_path)}')">🗑</button>
      </div>
      <div class="body">
        <span class="fname">${esc(r.filename)}</span>
        <span class="imgsize" id="imgsize-${r.id}"></span>
      </div>
    </div>`;
  }).join('') || '<p style="color:var(--muted)">No images ready for review yet.</p>';
}

async function downloadZip(){
  // TODO (see app/README.md): server.py's GET /zip endpoint (zips a project
  // subfolder) has no hosted equivalent yet — zipping storage-bucket objects
  // needs either a small server-side zip function or a client-side JS zip
  // lib pulling each signed URL. Not built in phase 1b; flagged as a gap.
  alert('Zip download needs a server-side (or client-side JS-zip) implementation — ' +
        'server.py\'s GET /zip has no hosted port yet. See app/README.md TODO list.');
}

async function init(){
  if (!projectId) { document.getElementById('proj-title').textContent = 'No project specified'; return; }
  try {
    const project = await db.getProject(projectId);
    document.title = `${project.name} — Review | Tolerance Studio`;
    document.getElementById('proj-title').textContent = project.name;
    var crumbProj = document.getElementById('crumb-proj');
    if (crumbProj) crumbProj.textContent = project.name;
    wireEmailLinkButton(project);
    renders = await db.listRenders(projectId);
    // Client-facing view (2026-07-09): composed images (8-compose.html's
    // upsertRender sets stage:'composed') PLUS anything approved/selected at
    // the Check stage that never went through Compose — Compose now has a
    // "Skip this step" button, so an approved render can reach Review
    // without ever becoming stage:'composed'. Excluding those used to mean
    // a skipped project's approved work just vanished from the client's view.
    renders = renders.filter(r => r.stage === 'composed' || (r.human_override || r.verdict) === 'approved');
    await render();
  } catch (e) {
    // RLS denies (not signed in as this client, or project not at review/delivered
    // stage yet) surfaces as an empty/failed read, not a leak.
    document.getElementById('proj-title').textContent = 'Nothing to show';
  }
}
init();
</script>
<script src="../assets/app-switcher.js"></script>
</body>
</html>
