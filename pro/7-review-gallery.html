<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Santa-Barbara-July-2026 — Wingstudio review | Tolerance Studio</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="lib/supabase.js"></script>
<script src="lib/db.js"></script>
<script src="lib/lightbox.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#111014; --paper:#f7f6f3; --card:#ffffff;
  --line:rgba(17,16,20,.12); --line-2:rgba(17,16,20,.22);
  --muted:#5d5b57; --accent:#d8502d; --accent-ink:#7a2a14; --accent-wash:#fbeae3;
  --chip:#eceae6; --radius:14px;
  --font-display:'Barlow Condensed',sans-serif;
  --font-body:'IBM Plex Sans',system-ui,sans-serif;
  --font-mono:'IBM Plex Mono','Courier New',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--paper);color:var(--ink);font-family:var(--font-body);line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.topbar{background:#fff;border-bottom:1px solid var(--line)}
.topbar-in{max-width:88rem;margin:0 auto;padding:0 1.6rem;display:flex;align-items:center;justify-content:space-between;height:64px}
.brand{display:flex;align-items:center;gap:.5rem;font-family:var(--font-display);font-weight:700;font-size:1.1rem;text-transform:uppercase}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);display:inline-block}
.client-badge{font-size:.78rem;color:var(--muted)}

.hero{max-width:74rem;margin:0 auto;padding:2.4rem 1.6rem 1.6rem}
.eyebrow{display:inline-flex;align-items:center;font-family:var(--font-mono);font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:#fff;border:1px solid var(--line-2);padding:.3rem .8rem;border-radius:100px;margin-bottom:1rem}
h1{font-family:var(--font-display);font-size:clamp(1.8rem,4vw,2.6rem);font-weight:700;text-transform:uppercase;letter-spacing:.01em;margin-bottom:.5rem}
.hero p{color:var(--muted);font-size:.95rem;max-width:56ch}

.toolbar{max-width:74rem;margin:0 auto;padding:0 1.6rem 1.6rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.8rem}
.count{font-size:.85rem;color:var(--muted)}
.btn{display:inline-flex;align-items:center;gap:.5rem;font-size:.88rem;font-weight:600;padding:.7rem 1.3rem;border-radius:10px;border:none;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .15s}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary{background:var(--ink);color:#fff}

.wrap{max-width:88rem;margin:0 auto;padding:0 1.6rem 4rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.2rem}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(17,16,20,.08)}
.card .imgwrap{aspect-ratio:4/3;background:#eee;overflow:hidden;position:relative}
.card img{width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in}
.fav-btn{position:absolute;top:.6rem;right:.6rem;width:2.1rem;height:2.1rem;border-radius:50%;background:rgba(255,255,255,.9);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;box-shadow:0 1px 4px rgba(17,16,20,.15)}
.fav-btn.on{color:var(--accent)}
.card .body{padding:.9rem 1rem 1.1rem;display:flex;flex-direction:column;gap:.6rem}
.fname{font-size:.78rem;color:var(--muted)}
.comment{width:100%;border:1px solid var(--line-2);border-radius:8px;padding:.5rem .7rem;font-family:inherit;font-size:.82rem;resize:none;min-height:2.4rem}

.footnote{text-align:center;color:var(--muted);font-size:.82rem;padding:2rem 1.6rem 3rem}

/* ---------- lightbox: zoom + prev/next, ported as-is from tools/control.html ---------- */
#lightbox{position:fixed;inset:0;background:rgba(10,9,12,.92);display:none;align-items:center;justify-content:center;z-index:1000;user-select:none}
#lightbox .lb-stage{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden}
#lightbox img{max-width:90vw;max-height:88vh;object-fit:contain;cursor:zoom-in;transition:transform .08s ease-out;touch-action:none}
#lightbox img.zoomed{cursor:grab;transition:none}
#lightbox img.panning{cursor:grabbing}
#lightbox .lb-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);color:#fff;border:none;width:2.6rem;height:2.6rem;border-radius:50%;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
#lightbox .lb-btn:hover{background:rgba(255,255,255,.24)}
#lightbox .lb-prev{left:1rem}
#lightbox .lb-next{right:1rem}
#lightbox .lb-close{position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,.12);color:#fff;border:none;width:2.2rem;height:2.2rem;border-radius:50%;font-size:1.1rem;cursor:pointer}
#lightbox .lb-close:hover{background:rgba(255,255,255,.24)}
#lightbox .lb-counter{position:absolute;top:1.1rem;left:1rem;color:#eee;font-size:.8rem;background:rgba(255,255,255,.12);border-radius:6px;padding:.25rem .55rem}
#lightbox .lb-open-orig{position:absolute;bottom:1rem;left:50%;transform:translateX(-50%);color:#eee;font-size:.75rem;background:rgba(255,255,255,.12);border-radius:6px;padding:.3rem .7rem;text-decoration:none}
#lightbox .lb-open-orig:hover{background:rgba(255,255,255,.24)}
#lightbox .lb-hint{position:absolute;bottom:1rem;right:1rem;color:#999;font-size:.68rem}
.imgwrap img.lb-thumb{cursor:pointer}
</style>
</head>
<body>
<div class="topbar"><div class="topbar-in">
  <div class="brand"><img src="../images/ts-logo.png" alt="" style="height:17px;width:auto;display:block;">Pro</div>
  <div class="client-badge" id="client-badge">Loading…</div>
</div></div>

<div class="hero">
  <span class="eyebrow">Client review</span>
  <h1 id="proj-title">…</h1>
  <p id="proj-desc"></p>
</div>

<div class="toolbar">
  <span class="count" id="img-count"></span>
  <button class="btn btn-primary" onclick="downloadZip()">⬇ Download all as zip</button>
</div>

<div class="wrap">
  <div class="grid" id="grid"></div>
</div>

<p class="footnote">Questions on any image? Reply to the delivery email — your studio contact sees comments and favorites here.</p>

<div id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <div class="lb-stage" onclick="if(event.target===this)closeLightbox()">
    <button class="lb-btn lb-prev" onclick="lbNext(-1)">‹</button>
    <img id="lb-img">
    <button class="lb-btn lb-next" onclick="lbNext(1)">›</button>
  </div>
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <div class="lb-counter" id="lb-counter"></div>
  <a class="lb-open-orig" id="lb-open-orig" target="_blank" rel="noopener">⤢ open original</a>
  <div class="lb-hint">click image to zoom · scroll to zoom · drag to pan · ← → to navigate · esc to close</div>
</div>
<script>
// This screen is reachable only via a per-project review link
// (?project=<id>), enforced by RLS: the client_read_projects /
// client_read_renders policies in 001_init.sql only return rows where
// status/stage is 'review' or 'delivered' AND the signed-in user is in
// client_users for that project's client. No separate client-login UI is
// built yet (see design-notes.md "Things intentionally left out") — this
// page assumes the visitor is already an authenticated Supabase Auth user
// tied to client_users; if not signed in, RLS returns zero rows rather than
// erroring, so this gracefully shows "no images" instead of leaking data.
//
// TODO (see app/README.md): favorites (♥) and comments have no column home
// in 001_init.sql (renders has no `favorite`/`comment` fields). Stored in
// localStorage for now, keyed by render id — NOT synced to the studio side,
// NOT visible to the Owner. Flagged to Owner: needs either new columns or a
// separate client_feedback table before this is real.

function qs(k){ return new URLSearchParams(location.search).get(k); }
function esc(s){ const d=document.createElement('div'); d.textContent=s??''; return d.innerHTML; }
const projectId = qs('project');
const FEEDBACK_KEY = 'ts-client-feedback-' + projectId;
function loadFeedback(){ try { return JSON.parse(localStorage.getItem(FEEDBACK_KEY) || '{}'); } catch(e){ return {}; } }
function saveFeedback(fb){ try { localStorage.setItem(FEEDBACK_KEY, JSON.stringify(fb)); } catch(e){} }

// Bucket is private, so getPublicUrl() 403s — every image needs a signed URL
// from the authenticated client. Cached per path across re-renders.
const signedUrlCache = {};
async function resolveSignedUrls(rs){
  await Promise.all(rs.map(async r => {
    if (!r.storage_path || signedUrlCache[r.storage_path]) return;
    try { signedUrlCache[r.storage_path] = await db.getSignedUrl(r.storage_path); }
    catch (e) { signedUrlCache[r.storage_path] = ''; }
  }));
}

function toggleFav(renderId){
  const fb = loadFeedback();
  fb[renderId] = fb[renderId] || {};
  fb[renderId].fav = !fb[renderId].fav;
  saveFeedback(fb);
  render();
}
function saveComment(renderId, text){
  const fb = loadFeedback();
  fb[renderId] = fb[renderId] || {};
  fb[renderId].comment = text;
  saveFeedback(fb);
}

let renders = [];
async function render(){
  await resolveSignedUrls(renders);
  const fb = loadFeedback();
  document.getElementById('img-count').textContent = `${renders.length} image${renders.length===1?'':'s'}`;
  document.getElementById('grid').innerHTML = renders.map(r => {
    const url = signedUrlCache[r.storage_path] || '';
    const f = fb[r.id] || {};
    return `<div class="card">
      <div class="imgwrap">
        <img class="lb-thumb" src="${esc(url)}" onclick="openLightbox(this)">
        <button class="fav-btn ${f.fav?'on':''}" onclick="toggleFav('${r.id}')">${f.fav?'♥':'♡'}</button>
      </div>
      <div class="body">
        <span class="fname">${esc(r.filename)}</span>
        <textarea class="comment" placeholder="Add a note (optional)…" onchange="saveComment('${r.id}', this.value)">${esc(f.comment||'')}</textarea>
      </div>
    </div>`;
  }).join('') || '<p style="color:var(--muted)">No images ready for review yet.</p>';
}

async function downloadZip(){
  // TODO (see app/README.md): server.py's GET /zip endpoint (zips a project
  // subfolder) has no hosted equivalent yet — zipping storage-bucket objects
  // needs either a small server-side zip function or a client-side JS zip
  // lib pulling each signed URL. Not built in phase 1b; flagged as a gap.
  alert('Zip download needs a server-side (or client-side JS-zip) implementation — ' +
        'server.py\'s GET /zip has no hosted port yet. See app/README.md TODO list.');
}

async function init(){
  if (!projectId) { document.getElementById('proj-title').textContent = 'No project specified'; return; }
  try {
    const project = await db.getProject(projectId);
    const clientName = project.clients ? project.clients.name : '';
    document.title = `${project.name} — ${clientName} review | Tolerance Studio`;
    document.getElementById('client-badge').textContent = `${clientName} — review link`;
    document.getElementById('proj-title').textContent = project.name;
    document.getElementById('proj-desc').textContent =
      `${project.product || ''} — ${project.description || ''}`.replace(/^ — /, '');
    renders = await db.listRenders(projectId);
    // Client-facing view: only approved/composed, matching server.py's
    // client bucket logic (4-Selects + 5-Size-Variations/composed) — here,
    // renders whose effective verdict is 'approved'.
    renders = renders.filter(r => (r.human_override || r.verdict) === 'approved');
    await render();
  } catch (e) {
    // RLS denies (not signed in as this client, or project not at review/delivered
    // stage yet) surfaces as an empty/failed read, not a leak.
    document.getElementById('proj-title').textContent = 'Nothing to show';
    document.getElementById('proj-desc').textContent = 'This review link has no images ready yet, or you need to sign in as this client.';
  }
}
init();
</script>
<script src="../assets/auth-bridge.js"></script>
<script src="../assets/app-switcher.js"></script>
</body>
</html>
