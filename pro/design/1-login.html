<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sign in — Tolerance Studio</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#111014; --paper:#f7f6f3; --card:#ffffff;
  --line:rgba(17,16,20,.12); --line-2:rgba(17,16,20,.22);
  --muted:#5d5b57; --accent:#d8502d; --accent-ink:#7a2a14; --accent-wash:#fbeae3;
  --chip:#eceae6; --radius:14px;
  --font-display:'Barlow Condensed',sans-serif;
  --font-body:'IBM Plex Sans',system-ui,sans-serif;
  --font-mono:'IBM Plex Mono','Courier New',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--paper);color:var(--ink);font-family:var(--font-body);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  line-height:1.6;-webkit-font-smoothing:antialiased;padding:1.5rem;
}
.card{
  width:100%;max-width:26rem;background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius);padding:2.4rem 2.2rem;box-shadow:0 1px 3px rgba(17,16,20,.06),0 0 0 1px rgba(17,16,20,.04);
}
.brand{display:flex;align-items:center;gap:.5rem;justify-content:center;margin-bottom:.4rem}
.brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);display:inline-block}
.brand-word{font-family:var(--font-display);font-weight:700;font-size:1.4rem;letter-spacing:-.01em;text-transform:uppercase}
.brand-tag{display:block;text-align:center;font-family:var(--font-mono);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:2.1rem}
.field{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.1rem}
.field label{font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:500}
.field input{font-family:inherit;font-size:.95rem;padding:.75rem .9rem;border:1px solid var(--line-2);border-radius:10px;background:#fff;color:var(--ink)}
.field input:focus{outline:2px solid var(--accent);outline-offset:1px}
.row-between{display:flex;justify-content:space-between;align-items:center;margin:.2rem 0 1.4rem}
.row-between a{font-size:.82rem;color:var(--accent-ink);text-decoration:none}
.row-between a:hover{text-decoration:underline}
.btn{width:100%;display:flex;align-items:center;justify-content:center;gap:.5rem;font-size:.95rem;font-weight:600;padding:.85rem 1.4rem;border-radius:10px;border:none;cursor:pointer;background:var(--ink);color:#fff;transition:opacity .15s,transform .15s;font-family:inherit}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.foot-note{margin-top:1.6rem;text-align:center;font-size:.78rem;color:var(--muted)}
.divider{display:flex;align-items:center;gap:.8rem;margin:1.6rem 0;color:var(--muted);font-size:.75rem}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}
.internal-badge{display:block;text-align:center;font-family:var(--font-mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent-ink);background:var(--accent-wash);padding:.3rem .7rem;border-radius:100px;margin:0 auto 1.6rem;width:fit-content}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><span class="dot"></span><span class="brand-word">Tolerance Studio 1.0</span></div>
  <span class="brand-tag">Pipeline</span>
  <span class="internal-badge">Owner sign-in</span>

  <form>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@toleranceStudio.com" value="owner@tolerancestudio.com">
    </div>
    <div class="field">
      <label for="pw">Password</label>
      <input type="password" id="pw" placeholder="••••••••••••" value="••••••••••••">
    </div>
    <div class="row-between">
      <span></span>
      <a href="#">Forgot password?</a>
    </div>
    <button type="button" class="btn" onclick="location.href='2-project-list.html'">Sign in →</button>
  </form>

  <div class="divider">or</div>
  <button type="button" class="btn" style="background:transparent;color:var(--ink);border:1px solid var(--line-2)">Client review link? Ask your studio contact</button>

  <p class="foot-note">Internal pipeline tool — not the marketing site. Clients sign in at their project's review link.</p>
</div>
</body>
</html>
