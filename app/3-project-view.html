<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Opening project… | Tolerance Studio</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="lib/supabase.js?v=20260714"></script>
<style>
body{background:#0c0b10;color:#9a978f;font-family:'IBM Plex Sans',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;font-size:.9rem}
.spin{width:22px;height:22px;border:3px solid rgba(255,255,255,.18);border-top-color:#9d7aff;border-radius:50%;animation:s 1s linear infinite;margin-right:.7rem}
@keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<span class="spin"></span>Opening your project…
<script>
// The project overview page is GONE (Owner call, 2026-07-15 — clicking a
// project should resume where they left off, not show a summary screen).
// This stub survives only as a redirect so every old link — Files-page
// project chips, breadcrumbs, bookmarks — lands on the furthest step
// reached. Same resume mapping as 2-project-list.html's projectHref():
// a composed/approved render always means Review; otherwise project.status.
// (The old overview markup is in git history if it's ever wanted back.)
(async function(){
  var qs = new URLSearchParams(location.search);
  var projectId = qs.get('project');
  var fallback = '2-project-list.html';
  if (!projectId){ location.replace(fallback); return; }
  var STATUS_HREF = {
    brief: '4-tags-editor.html',
    generating: '6-checker-gallery.html',
    checking: '6-checker-gallery.html',
    compose: '8-compose.html',
    review: '7-review-gallery.html',
    delivered: '7-review-gallery.html',
  };
  try {
    var pq = await sb.from('projects').select('status').eq('id', projectId).single();
    if (pq.error) throw pq.error;
    var rq = await sb.from('renders')
      .select('stage, verdict, human_override')
      .eq('project_id', projectId);
    var hasReviewable = (rq.data || []).some(function(r){
      return r.stage === 'composed' || (r.human_override || r.verdict) === 'approved';
    });
    var page = hasReviewable ? '7-review-gallery.html' : (STATUS_HREF[pq.data.status] || '4-tags-editor.html');
    location.replace(page + '?project=' + encodeURIComponent(projectId));
  } catch (e) {
    // Not signed in / RLS denied / project gone — the list page handles all
    // of those (it has the login gate and its own empty states).
    location.replace(fallback);
  }
})();
</script>
</body>
</html>
