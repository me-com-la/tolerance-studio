:root{
  --ink:#e8e6e1; --paper:#0c0b10; --card:#1a1820;

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--paper);color:var(--ink);font-family:var(--font-body);line-height:1.5;-webkit-font-smoothing:antialiased}

.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);display:inline-block}
.overview-bar{background:rgba(12,11,16,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--line);position:sticky;top:60px;z-index:16}
.overview-bar-in{max-width:88rem;margin:0 auto;padding:0 1.6rem;display:flex;align-items:center;gap:1rem;height:44px}
.overview-tab{font-family:var(--font-display);font-size:.92rem;font-weight:600;text-transform:uppercase;letter-spacing:.02em;color:var(--muted);border-bottom:3px solid transparent;padding:.55rem 0;cursor:pointer;text-decoration:none}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--thumb),1fr));gap:1.2rem}

.fav-btn{position:absolute;top:.6rem;right:.6rem;width:2.1rem;height:2.1rem;border-radius:50%;background:rgba(255,255,255,.15);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;box-shadow:0 1px 4px rgba(0,0,0,.3);color:#fff}
.fav-btn.on{color:var(--accent)}
.card .body{padding:.9rem 1rem 1.1rem;display:flex;flex-direction:column;gap:.6rem}
.fname{font-size:.78rem;color:var(--muted)}
.imgsize{font-size:.72rem;color:var(--muted);font-family:var(--font-mono)}
.comment{width:100%;border:1px solid var(--line-2);border-radius:8px;padding:.5rem .7rem;font-family:inherit;font-size:.82rem;resize:none;min-height:2.4rem}

.footnote{text-align:center;color:var(--muted);font-size:.82rem;padding:2rem 1.6rem 3rem}

/* ---------- animations (video clips) ---------- */
.anim-section{margin:0 0 2.2rem}
.anim-h{font-family:var(--font-display);font-size:1.05rem;font-weight:700;text-transform:uppercase;letter-spacing:.02em;margin-bottom:.9rem}
.anim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.2rem}
.anim-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column}
/* The video comes back padded to a ratio the model speaks; the crop-frame
   clips it back to the user's exact composed size. Inner video is % sized
   off the stored pad math. */
.anim-frame{position:relative;overflow:hidden;background:var(--chip);width:100%}
.anim-frame video{position:absolute;display:block}
.anim-body{padding:.8rem 1rem 1rem;display:flex;flex-direction:column;gap:.5rem}
.anim-meta{font-size:.75rem;color:var(--muted)}
.anim-actions{display:flex;gap:.5rem;flex-wrap:wrap}
.anim-actions .btn{padding:.42rem .8rem;font-size:.78rem}
.anim-pending{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.8rem;padding:2.2rem 1rem;color:var(--muted);font-size:.85rem}
.anim-spin{width:30px;height:30px;border:3px solid var(--line-2);border-top-color:var(--accent);border-radius:50%;animation:anim-spin 1s linear infinite}
@keyframes anim-spin{to{transform:rotate(360deg)}}
.anim-err{color:#e08a7a;font-size:.8rem}

#lightbox .lb-close:hover{background:rgba(255,255,255,.24)}
#lightbox .lb-counter{position:absolute;top:1.1rem;left:1rem;color:#eee;font-size:.8rem;background:rgba(255,255,255,.12);border-radius:6px;padding:.25rem .55rem}
#lightbox .lb-open-orig{position:absolute;bottom:1rem;left:50%;transform:translateX(-50%);color:#eee;font-size:.75rem;background:rgba(255,255,255,.12);border-radius:6px;padding:.3rem .7rem;text-decoration:none}

<script>
// Review gallery — shows composed + approved images for a project.

function qs(k){ return new URLSearchParams(location.search).get(k); }
function esc(s){ const d=document.createElement('div'); d.textContent=s??''; return d.innerHTML; }
const projectId = qs('project');

// Bucket is private, so getPublicUrl() 403s — every image needs a signed URL
// from the authenticated client. Cached per path across re-renders.
const signedUrlCache = {};
async function resolveSignedUrls(rs){
  await Promise.all(rs.map(async r => {
    if (!r.storage_path || signedUrlCache[r.storage_path]) return;
    try { signedUrlCache[r.storage_path] = await db.getSignedUrl(r.storage_path); }
    catch (e) { signedUrlCache[r.storage_path] = ''; }
  }));
}

// Image size label — pixel dimensions come free from the <img> itself once
// loaded (onload="reportImageDims"); file size needs a separate HEAD
// request against the same signed URL (Content-Length header), cached per
// storage path so re-renders (e.g. after a favorite/comment) don't refetch.
const fileSizeCache = {};
function formatBytes(bytes){
  if (!bytes) return '';
  if (bytes < 1024*1024) return `${(bytes/1024).toFixed(0)}KB`;
  return `${(bytes/(1024*1024)).toFixed(1)}MB`;
}
function renderImageSize(renderId, dims, sizeText){
  const el = document.getElementById(`imgsize-${renderId}`);
  if (!el) return;
  el.textContent = [dims, sizeText].filter(Boolean).join(' · ');
}
async function reportImageDims(img, renderId){
  const dims = `${img.naturalWidth}×${img.naturalHeight}`;
  renderImageSize(renderId, dims, fileSizeCache[img.src]);
  if (!(img.src in fileSizeCache)) {
    try {
      const res = await fetch(img.src, { method: 'HEAD' });
      const len = parseInt(res.headers.get('Content-Length') || '0', 10);
      fileSizeCache[img.src] = formatBytes(len);
    } catch (e) { fileSizeCache[img.src] = ''; }
    renderImageSize(renderId, dims, fileSizeCache[img.src]);
  }
}

// Deliver in 4K — upscale the EXACT approved render (not a re-gen) via the
// upscale Edge Function (fal Topaz), store the 4K file, and mark the card.
// The client viewer then downloads the 4K version. Owner-only: the function
// reads/writes under the Owner's session, so a client visitor can't spend
// upscale credits.
async function upscaleRender(renderId, btn){
  const r = renders.find(x => x.id === renderId);
  if (!r) return;
  const label = btn.textContent;
  btn.disabled = true; btn.textContent = '↑ Upscaling to 4K…';
  try {
    const res = await callFunction('upscale', { renderId });
    r.hires_path = res.hires_path; r.hires_w = res.w; r.hires_h = res.h;
    await render();
  } catch (e) {
    btn.disabled = false; btn.textContent = label;
    alert('4K upscale failed: ' + (e.message || e));
  }
}

async function toggleFav(renderId){
  const r = renders.find(x => x.id === renderId);
  if (!r) return;
  const next = !r.is_favorite;
  r.is_favorite = next;
  render();
  const { error } = await sb.from('renders').update({ is_favorite: next }).eq('id', renderId);
  if (error) { r.is_favorite = !next; render(); }
}

// Delete a delivered image — same pattern as the Check/Select galleries.
// RLS only lets the Owner actually remove rows/files; a client visitor's
// click surfaces as a permission error rather than deleting anything.
async function deleteRenderInline(event, renderId, storagePath){
  event.stopPropagation();
  if (!confirm('Delete this image? This cannot be undone.')) return;
  try {
    if (storagePath) await db.removeFiles([storagePath]);
    const { error } = await sb.from('renders').delete().eq('id', renderId);
    if (error) throw error;
    renders = renders.filter(x => x.id !== renderId);
    await render();
  } catch (e) { alert('Delete failed: ' + (e.message || e)); }
}

let renders = [];
let project = null;

// ---------- animations (video clips — first iteration, 2026-07-14 R&D) ----------
// Jobs are created on the Compose page (Animate button) and live in
// project.settings.animation_jobs — Compose only SUBMITS to fal (video takes
// minutes), this page finishes the story: poll pending jobs, download the
// result through the animate Edge Function (fal storage has no browser CORS),
// store the mp4 in the private bucket, and show it cropped back to the exact
// size the user composed (the model only speaks 1:1/16:9/9:16, so Compose
// padded the frame and recorded the math on the job).
let animPollTimer = null;
const animBusy = new Set(); // job ids mid-download/upload — a poll tick must not double-handle

function animJobs(){ return (project && project.settings && project.settings.animation_jobs) || []; }
async function saveAnimJobs(){
  await db.saveSettings(projectId, Object.assign({}, project.settings || {}, { animation_jobs: animJobs() }));
}
function fmtWhen(iso){ try { return new Date(iso).toLocaleString(); } catch(e){ return ''; } }

async function renderAnimations(){
  const jobs = animJobs();
  const section = document.getElementById('anim-section');
  section.style.display = jobs.length ? '' : 'none';
  if (!jobs.length) return;
  const cards = await Promise.all(jobs.map(async j => {
    const meta = `${esc(j.baseName || '')} · ${esc(j.sizeKey || '')} · ${j.w}×${j.h} · ${fmtWhen(j.created_at)}`
      + (j.note ? ` · <span style="color:var(--accent-ink)">“${esc(j.note)}”</span>` : '');
    if (j.status === 'done' && (j.final_path || j.storage_path)){
      // Finished clip is already the exact composed size — plays as-is. A
      // raw clip (finish failed) is the padded frame, so CSS-crop it back.
      const playPath = j.final_path || j.storage_path;
      if (!signedUrlCache[playPath]) {
        try { signedUrlCache[playPath] = await db.getSignedUrl(playPath); } catch (e) { signedUrlCache[playPath] = ''; }
      }
      const url = signedUrlCache[playPath];
      const videoTag = j.final_path
        ? `<video class="anim-preview" src="${esc(url)}" muted loop playsinline preload="metadata" style="position:static;width:100%;height:auto;display:block"></video>`
        : (() => {
            const vidW = (j.padW / j.w) * 100;
            const left = -(j.offX / j.w) * 100;
            const top = -(j.offY / j.h) * 100;
            return `<video class="anim-preview" src="${esc(url)}" muted loop playsinline preload="metadata" style="width:${vidW}%;left:${left}%;top:${top}%"></video>`;
          })();
      const finishNote = j.finish_error
        ? `<span class="anim-err">Finishing failed (${esc(j.finish_error)}) — showing the raw clip, words not stamped yet.</span>`
        : (!j.text_path
          ? `<span class="anim-meta">No words on this clip — none were captured when it was animated. Animate again from Size and Text with your copy in place.</span>`
          : '');
      const finishBtns = j.finish_error
        ? `<button class="btn btn-ghost" onclick="animRefinish('${j.id}')" title="Re-run crop + loop + words — no new generation cost">↻ Retry finish</button>`
        : (j.gif_path ? `<button class="btn btn-ghost" onclick="animDownload('${j.id}','gif')">⬇ Email GIF</button>` : '');
      return `<div class="anim-card">
        <div class="anim-frame" style="aspect-ratio:${j.w}/${j.h}">
          ${videoTag}
        </div>
        <div class="anim-body">
          <span class="anim-meta">${meta}</span>
          ${finishNote}
          <div class="anim-actions">
            <button class="btn btn-ghost" onclick="animDownload('${j.id}')">⬇ Video</button>
            ${finishBtns}
            <button class="btn btn-ghost" onclick="animTryAgain('${j.id}')" title="Edit the motion prompt and generate a fresh clip from the same image">✎ Edit &amp; redo</button>
            <button class="btn btn-ghost" onclick="animDelete('${j.id}')">✕ Remove</button>
          </div>
        </div>
      </div>`;
    }
    if (j.status === 'finishing'){
      return `<div class="anim-card">
        <div class="anim-pending"><span class="anim-spin"></span>Sizing, looping and placing your words…</div>
        <div class="anim-body"><span class="anim-meta">${meta}</span></div>
      </div>`;
    }
    if (j.status === 'failed'){
      return `<div class="anim-card">
        <div class="anim-pending"><span class="anim-err">Animation failed${j.error ? ` — ${esc(j.error)}` : ''}</span></div>
        <div class="anim-body">
          <span class="anim-meta">${meta}</span>
          <div class="anim-actions">
            <button class="btn btn-ghost" onclick="animTryAgain('${j.id}')">✎ Edit &amp; redo</button>
            <button class="btn btn-ghost" onclick="animDelete('${j.id}')">✕ Remove</button>
          </div>
        </div>
      </div>`;
    }
    return `<div class="anim-card">
      <div class="anim-pending"><span class="anim-spin"></span>Animating — usually a minute or two…</div>
      <div class="anim-body"><span class="anim-meta">${meta}</span></div>
    </div>`;
  }));
  document.getElementById('anim-grid').innerHTML = cards.join('');
  // Wire hover/tap-to-play + one-at-a-time (lib/anim-preview.js) on the fresh
  // <video> nodes we just injected — a bare autoplay grid stalls once it
  // exhausts the browser's video-decoder budget.
  if (window.AnimPreview) AnimPreview.init(document.getElementById('anim-grid'));
}

async function pollAnimations(){
  const pending = animJobs().filter(j => j.status === 'pending');
  if (!pending.length){
    if (animPollTimer) { clearInterval(animPollTimer); animPollTimer = null; }
    return;
  }
  for (const j of pending){
    if (animBusy.has(j.id)) continue;
    try {
      const s = await callFunction('animate', { action: 'status', status_url: j.status_url });
      if (s.status === 'COMPLETED'){
        animBusy.add(j.id);
        const r = await callFunction('animate', { action: 'result', response_url: j.response_url });
        const dl = await callFunction('animate', { action: 'download', video_url: r.video_url });
        const bytes = Uint8Array.from(atob(dl.video_b64), ch => ch.charCodeAt(0));
        const filename = `${j.baseName || 'clip'}-${j.sizeKey}-${j.id}.mp4`;
        const path = db.storagePath(project.clients.slug, projectId, 'video', filename);
        await db.uploadFile(path, new Blob([bytes], { type: dl.mime_type || 'video/mp4' }));
        j.status = 'finishing'; j.storage_path = path;
        await saveAnimJobs();
        await renderAnimations();
        // Second half: crop to composed size + seamless loop + stamp the
        // words back on + email GIF, on the pixel-lock Cloud Run box.
        await finishAnimation(j);
        await db.createRunLogEntry(projectId, 'generate', `animation finished: ${filename}`);
        animBusy.delete(j.id);
        await renderAnimations();
      } else if (s.status === 'ERROR' || s.status === 'FAILED'){
        j.status = 'failed'; j.error = 'the video model rejected this run';
        await saveAnimJobs();
        await renderAnimations();
      }
    } catch (e) {
      // Transient (network, signed-url expiry) — leave the job pending, the
      // next tick retries. Only a fal FAILED status marks it failed for good.
      animBusy.delete(j.id);
    }
  }
}

function startAnimPolling(){
  if (animPollTimer) return;
  pollAnimations();
  animPollTimer = setInterval(pollAnimations, 6000);
}

// Finishing pass (2026-07-14): raw fal clip -> deliverables, via the
// pixel-lock Cloud Run service's /video-finish (ffmpeg lives there; the
// browser and Deno edge functions have none). Crop math comes from the pad
// numbers Compose stored on the job, as FRACTIONS — fal decides its own
// output resolution, so pixel coords would be wrong. Results go straight
// to storage through signed upload URLs (Cloud Run responses have a hard
// size ceiling that a 10s clip can graze).
async function fileB64FromPath(path){
  const url = await db.getSignedUrl(path);
  const buf = await (await fetch(url)).arrayBuffer();
  const bytes = new Uint8Array(buf);
  let bin = '';
  const CHUNK = 32768;
  for (let i = 0; i < bytes.length; i += CHUNK) bin += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
  return btoa(bin);
}
async function finishAnimation(j){
  try {
    const finalPath = db.storagePath(project.clients.slug, projectId, 'video', `${j.baseName || 'clip'}-${j.sizeKey}-${j.id}-final.mp4`);
    const gifPath   = db.storagePath(project.clients.slug, projectId, 'video', `${j.baseName || 'clip'}-${j.sizeKey}-${j.id}.gif`);
    const { data: mp4Up, error: e1 } = await sb.storage.from('projects').createSignedUploadUrl(finalPath);
    const { data: gifUp, error: e2 } = await sb.storage.from('projects').createSignedUploadUrl(gifPath);
    if (e1 || e2) throw (e1 || e2);
    const body = {
      video_url: await db.getSignedUrl(j.storage_path),
      crop: { xf: j.offX / j.padW, yf: j.offY / j.padH, wf: j.w / j.padW, hf: j.h / j.padH },
      pingpong: !j.loop, gif: true,
      mp4_upload_url: mp4Up.signedUrl, gif_upload_url: gifUp.signedUrl,
    };
    if (j.text_path) body.text_png_b64 = await fileB64FromPath(j.text_path);
    await callLocalService('video-finish', body);
    j.status = 'done'; j.final_path = finalPath; j.gif_path = gifPath; j.finish_error = null;
  } catch (e) {
    // Raw clip is safe in storage — show it (cropped in CSS) and let the
    // finish be retried without another fal spend.
    j.status = 'done'; j.finish_error = e.message || String(e);
  }
  await saveAnimJobs();
}
// Retry only the finishing pass (no new fal run, no new cost).
async function animRefinish(jobId){
  const j = animJobs().find(x => x.id === jobId);
  if (!j || !j.storage_path) return;
  j.status = 'finishing'; await saveAnimJobs(); await renderAnimations();
  await finishAnimation(j);
  await renderAnimations();
}

// Signed URLs are cross-origin, so a plain <a download> is ignored by the
// browser — fetch the bytes and hand over a local blob instead.
async function animDownload(jobId, kind){
  const j = animJobs().find(x => x.id === jobId);
  if (!j) return;
  // 'gif' → email GIF; default → finished mp4, falling back to the raw clip.
  const path = kind === 'gif' ? j.gif_path : (j.final_path || j.storage_path);
  if (!path) return;
  try {
    const url = signedUrlCache[path] || await db.getSignedUrl(path);
    const blob = await (await fetch(url)).blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${j.baseName || 'clip'}-${j.sizeKey || 'anim'}.${kind === 'gif' ? 'gif' : 'mp4'}`;
    a.click();
    URL.revokeObjectURL(a.href);
  } catch (e) { alert('Download failed: ' + (e.message || e)); }
}

// Fresh take from the SAME stored clean frame — no need to rebuild the
// Compose layout. Old result stays so takes can be compared side by side.
async function animTryAgain(jobId){
  const j = animJobs().find(x => x.id === jobId);
  if (!j) return;
  if (!j.frame_path){ alert('The original frame for this animation is gone — re-run Animate from Size and Text.'); return; }
  // Same transparent prompt modal as Compose (lib/animate-modal.js, Owner
  // call 2026-07-15): prefilled with exactly what was sent last time, the
  // user edits it directly, guardrails stay read-only. Old jobs from the
  // hidden-prompt era have no motion_text — for those the whole stored
  // prompt becomes the editable text (no guardrails to re-append, they're
  // already inside it).
  const frameUrl = await db.getSignedUrl(j.frame_path);
  const motionText = j.motion_text || j.prompt || '';
  const guardrails = j.motion_text ? (j.guardrails || '') : '';
  AnimateModal.open({
    motionText,
    loop: j.loop !== undefined ? !!j.loop : true,
    guardrails,
    submitLabel: '✦ Redo animation',
    suggest: async () => (await callFunction('animate', { action: 'suggest', image_url: frameUrl })).suggestion,
    onSubmit: async ({ motionText: newMotion, loop }) => {
      const newPrompt = guardrails ? `${newMotion}\n\n${guardrails}` : newMotion;
      // A seamless-loop job must resend the same frame as the tail, or the
      // fresh clip won't actually loop.
      const sub = await callFunction('animate', Object.assign(
        { action: 'submit', image_url: frameUrl, prompt: newPrompt, duration: j.duration || '5' },
        loop ? { tail_image_url: frameUrl } : {},
      ));
      const fresh = Object.assign({}, j, {
        id: `anim-${Date.now()}`,
        request_id: sub.request_id, status_url: sub.status_url, response_url: sub.response_url,
        prompt: newPrompt, motion_text: newMotion, guardrails, loop,
        status: 'pending', storage_path: null, final_path: null, gif_path: null,
        error: null, finish_error: null, created_at: new Date().toISOString(),
      });
      project.settings.animation_jobs = [...animJobs(), fresh];
      await saveAnimJobs();
      await renderAnimations();
      startAnimPolling();
    },
  });
}

async function animDelete(jobId){
  const j = animJobs().find(x => x.id === jobId);
  if (!j) return;
  if (!confirm('Remove this animation? This cannot be undone.')) return;
  try {
    const files = [j.storage_path, j.final_path, j.gif_path].filter(Boolean);
    if (files.length) await db.removeFiles(files);
    project.settings.animation_jobs = animJobs().filter(x => x.id !== jobId);
    await saveAnimJobs();
    await renderAnimations();
  } catch (e) { alert('Remove failed: ' + (e.message || e)); }
}

async function render(){
  await resolveSignedUrls(renders);
  document.getElementById('img-count').textContent = `${renders.length} image${renders.length===1?'':'s'}`;
  document.getElementById('grid').innerHTML = renders.map(r => {
    const url = signedUrlCache[r.storage_path] || '';
    return `<div class="card">
      <div class="imgwrap">
        <img class="lb-thumb" src="${esc(url)}" onclick="openLightbox(this)" onload="reportImageDims(this,'${r.id}')">
        <button class="fav-btn ${r.is_favorite?'on':''}" onclick="toggleFav('${r.id}')">${r.is_favorite?'♥':'♡'}</button>
        <button class="del-btn" title="Delete" onclick="deleteRenderInline(event,'${r.id}','${esc(r.storage_path)}')">🗑</button>
      </div>
      <div class="body">
        <span class="fname">${esc(r.filename)}</span>
        <span class="imgsize" id="imgsize-${r.id}"></span>
        ${r.hires_path
          ? `<span class="imgsize" style="color:var(--accent)">✓ 4K ready${r.hires_w?` · ${r.hires_w}×${r.hires_h}`:''}</span>`
          : `<button class="btn btn-ghost" style="padding:.42rem .8rem;font-size:.76rem" onclick="upscaleRender('${r.id}',this)" title="Upscale this exact image to 4K for print / large-format delivery (~8¢)">⬆ Deliver in 4K</button>`}
      </div>
    </div>`;
  }).join('') || '<p style="color:var(--muted)">No images ready for review yet.</p>';
}

async function downloadZip(){
  // TODO (see app/README.md): server.py's GET /zip endpoint (zips a project
  // subfolder) has no hosted equivalent yet — zipping storage-bucket objects
  // needs either a small server-side zip function or a client-side JS zip
  // lib pulling each signed URL. Not built in phase 1b; flagged as a gap.
  alert('Zip download needs a server-side (or client-side JS-zip) implementation — ' +
        'server.py\'s GET /zip has no hosted port yet. See app/README.md TODO list.');
}

// Owner-only "send this to the client" shortcut. The link points at the
// PUBLIC viewer (../review.html?t=<share_token>), NOT this owner page — the
// client has no account and RLS would hand them nothing on this page. The
// viewer authenticates the share token through the review-view Edge Function
// (migration 006), so the emailed link opens with no login, even inside a
// mail app's in-app browser. "Copy link" grabs the same URL for pasting
// anywhere; the mail button just prefills the default mail client.
function clientReviewUrl(project){
  // review.html lives at the site root, one level up from app/.
  const base = location.href.replace(/\/app\/[^/]*$/, '');
  return `${base}/review.html?t=${encodeURIComponent(project.share_token || '')}`;
}
function wireEmailLinkButton(project, clientName){
  if (!project.share_token) return; // no token yet (run migration 006) — leave buttons hidden
  const url = clientReviewUrl(project);
  const subject = `${project.name} — ready for your review`;
  const body = `Hi,\n\nYour images for "${project.name}" are ready to review and download:\n${url}\n\nThanks!`;

  const mail = document.getElementById('email-link-btn');
  mail.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  mail.style.display = '';

  const copy = document.getElementById('copy-link-btn');
  copy.style.display = '';
  copy.onclick = async () => {
    try { await navigator.clipboard.writeText(url); copy.textContent = '✓ Client link copied'; }
    catch (e) { prompt('Copy the client review link:', url); return; }
    setTimeout(() => { copy.textContent = '🔗 Copy client link'; }, 1800);
  };
}

async function init(){
  const showStatus = (msg) => {
    const el = document.getElementById('review-status');
    if (el) { el.textContent = msg; el.style.display = ''; }
  };
  if (!projectId) { showStatus('No project specified'); return; }
  try {
    project = await db.getProject(projectId);
    document.title = `${project.name} — Review | Tolerance Studio`;
    // Project name lives in the sticky breadcrumb (same as Compose and the
    // other steps) — no scrolling hero title on this page.
    var crumbProj = document.getElementById('crumb-proj');
    if (crumbProj) {
      crumbProj.textContent = project.name;
      crumbProj.href = `3-project-view.html?project=${encodeURIComponent(projectId)}`;
    }
    wireEmailLinkButton(project, project.clients ? project.clients.name : '');
    renders = await db.listRenders(projectId);
    // Client-facing view (2026-07-09): composed images (8-compose.html's
    // upsertRender sets stage:'composed') PLUS anything approved at the
    // Check stage that never went through Compose — Compose now has a
    // "Skip this step" button, so an approved render can reach Review
    // without ever becoming stage:'composed'. Excluding those used to mean
    // a skipped project's approved work just vanished from the client's view.
    renders = renders.filter(r => r.stage === 'composed' || (r.human_override || r.verdict) === 'approved');
    await render();
    // Animations: show finished clips, and pick up any still-cooking jobs
    // the Compose page submitted (this page owns the poll → store → show).
    await renderAnimations();
    if (animJobs().some(j => j.status === 'pending')) startAnimPolling();
    // Resume any job the user abandoned mid-finish (raw clip stored, page
    // closed before the Cloud Run pass came back) — no fal cost to redo.
    for (const j of animJobs().filter(x => x.status === 'finishing' && x.storage_path)){
      finishAnimation(j).then(renderAnimations);
    }
  } catch (e) {
    // RLS denies (not signed in as this client, or project not at review/delivered
    // stage yet) surfaces as an empty/failed read, not a leak.
    showStatus('Nothing to show');
  }
}
init();
</script>
