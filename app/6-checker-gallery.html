<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Checker — Blue — Kindtail | Tolerance Studio</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="lib/supabase.js?v=20260714"></script>
<script src="lib/db.js?v=20260714"></script>
<script src="lib/functions.js?v=20260714"></script>
<script src="lib/lightbox.js?v=20260714"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#e8e6e1; --paper:#0c0b10; --card:#1a1820;
  --line:rgba(255,255,255,.1); --line-2:rgba(255,255,255,.18);
  --muted:#9a978f; --accent:#9d7aff; --accent-ink:#c4b0ff; --accent-wash:rgba(157,122,255,.15);
  --chip:#2a2735; --radius:14px;
  --font-display:'Barlow Condensed',sans-serif;
  --font-body:'IBM Plex Sans',system-ui,sans-serif;
  --font-mono:'IBM Plex Mono','Courier New',monospace;
  --ok:#2e7d32; --ok-wash:rgba(46,180,130,.16); --ok-ink:#7ee2c0;
  --bad:#a33; --bad-wash:rgba(180,70,70,.18); --bad-ink:#f0a0a0;
  --warn:#b45309; --warn-wash:rgba(180,110,30,.2); --warn-ink:#f0b878;
  --thumb:230px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--paper);color:var(--ink);font-family:var(--font-body);line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.topbar{background:rgba(12,11,16,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
.topbar-in{max-width:88rem;margin:0 auto;padding:0 1.6rem;display:flex;align-items:center;justify-content:space-between;height:60px}
.brand{display:flex;align-items:center;gap:.5rem;font-family:var(--font-display);font-weight:700;font-size:1.05rem;text-transform:uppercase}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);display:inline-block}
.crumbs{font-size:.85rem;color:var(--muted);display:flex;align-items:center;gap:.4rem}
.crumbs a:hover{color:var(--ink)}
.crumbs .cur{color:var(--ink);font-weight:600}
.who{display:flex;align-items:center;gap:.7rem;font-size:.85rem;color:var(--muted)}
.avatar{width:28px;height:28px;border-radius:8px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:600;font-size:.8rem}
.overview-bar{background:rgba(12,11,16,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--line);position:sticky;top:60px;z-index:16}
.overview-bar-in{max-width:88rem;margin:0 auto;padding:0 1.6rem;display:flex;align-items:center;gap:1rem;height:44px}
.overview-tab{font-family:var(--font-display);font-size:.92rem;font-weight:600;text-transform:uppercase;letter-spacing:.02em;color:var(--muted);border-bottom:3px solid transparent;padding:.55rem 0;cursor:pointer;text-decoration:none}
.overview-tab:hover{color:var(--ink)}
.rail-wrap{background:rgba(12,11,16,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--line);position:sticky;top:60px;z-index:15}
.rail{max-width:88rem;margin:0 auto;padding:0 1.6rem;display:flex;overflow-x:auto}
.rail-step{display:flex;align-items:center;justify-content:center;flex:1;gap:.6rem;padding:.9rem 1.1rem;white-space:nowrap;border-bottom:3px solid transparent;cursor:pointer;color:var(--muted);font-size:.88rem;font-weight:500}
.rail-step .n{width:22px;height:22px;border-radius:50%;background:var(--chip);color:var(--muted);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:.72rem;font-weight:600}
.rail-step.done .n{background:#2e7d32;color:#fff}
.rail-step.active{color:var(--ink);border-bottom-color:var(--accent);font-weight:600}
.rail-step.active .n{background:var(--accent);color:#fff}
/* Locked = future step, not yet unlocked. See 4-tags-editor.html for full note. */
.rail-step.locked{pointer-events:none;opacity:.4;cursor:default}
.rail-step.locked .n{background:var(--chip);color:var(--muted)}

.wrap{max-width:88rem;margin:0 auto;padding:2.6rem 1.6rem 4rem}
h1{font-family:var(--font-display);font-size:2.2rem;font-weight:700;text-transform:uppercase;margin-bottom:.3rem}
.sub{color:var(--muted);font-size:.9rem;margin-bottom:1.4rem;max-width:70ch;line-height:1.6}
.sub b{color:var(--ink)}
.btn{display:inline-flex;align-items:center;gap:.5rem;font-size:.85rem;font-weight:600;padding:.6rem 1.1rem;border-radius:10px;border:none;cursor:pointer;font-family:inherit;transition:opacity .2s,transform .2s;white-space:nowrap}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary{background:var(--accent);color:#fff}
.btn-next{background:#fff;color:#111}
.btn-next:hover{opacity:.9}
.savebar{position:sticky;bottom:0;background:var(--paper);padding:1rem 0 0;display:flex;align-items:center;justify-content:flex-end;gap:.6rem}

.tally-bar{display:flex;gap:1.6rem;flex-wrap:wrap;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:1rem 1.3rem;margin-bottom:1.6rem}
.tally-item{display:flex;flex-direction:column}
.tally-num{font-family:var(--font-mono);font-size:1.5rem;font-weight:600}
.tally-label{font-size:.76rem;color:var(--muted)}

.section-h{display:flex;align-items:center;gap:.6rem;margin:1.6rem 0 .8rem}
.section-h h2{font-family:var(--font-display);font-size:1.15rem;font-weight:700;text-transform:uppercase}
.section-h .count{font-size:.82rem;color:var(--muted)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--thumb),1fr));gap:1rem}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column}
.card .imgwrap{aspect-ratio:4/3;background:var(--chip);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
.fav-btn,.del-btn{position:absolute;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;width:1.9rem;height:1.9rem;background:rgba(255,255,255,.15);color:#fff;opacity:0;transition:opacity .15s,background .15s;font-size:1rem}
.imgwrap:hover .fav-btn,.imgwrap:hover .del-btn{opacity:1}
.fav-btn{top:.4rem;right:.4rem}
.fav-btn:hover{background:rgba(255,255,255,.25)}
.fav-btn.active{opacity:1;color:var(--accent)}
.del-btn{top:.4rem;left:.4rem}
.del-btn:hover{background:#a33}
.card img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;display:block}
.card .body{padding:.8rem .9rem 1rem;display:flex;flex-direction:column;gap:.5rem}
.verdict-pill{display:inline-flex;align-items:center;gap:.35rem;font-size:.72rem;font-weight:600;padding:.25rem .6rem;border-radius:100px;width:fit-content}
.v-checker-pass{color:var(--ok-ink);background:var(--ok-wash)}
.v-checker-fail{color:var(--bad-ink);background:var(--bad-wash)}
.v-checker-review{color:var(--warn-ink);background:var(--warn-wash)}
.check-summary{font-size:.8rem;color:var(--muted);line-height:1.5;background:var(--chip);border-radius:8px;padding:.5rem .6rem}
.override-row{display:flex;gap:.5rem;margin-top:.2rem}
.ov-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:.35rem;font-size:.78rem;font-weight:600;padding:.5rem;border-radius:8px;border:1px solid var(--line-2);background:var(--card);cursor:pointer;font-family:inherit}
/* Two clean states only: neutral (not approved) and solid green (approved). */
.ov-btn.approve{color:var(--muted)}
.ov-btn.approve:hover{background:var(--chip);border-color:var(--line-2)}
.ov-btn.approve.active{background:var(--ok);border-color:var(--ok);color:#fff}
.ov-btn.approve.active:hover{background:var(--ok);opacity:.9}
.override-badge{display:inline-flex;align-items:center;gap:.35rem;font-size:.72rem;font-weight:700;padding:.3rem .6rem;border-radius:8px}
.override-badge.approved{color:var(--ok);background:var(--ok-wash)}
.override-badge.rejected{color:var(--bad);background:var(--bad-wash)}
.ov-btn.run{color:var(--ink);font-weight:700}.ov-btn.run:hover{background:var(--accent-wash);border-color:var(--accent)}
.check-status{font-size:.72rem;color:var(--muted)}
.check-status.busy{font-style:italic}
.check-status.err{color:var(--bad);font-style:normal}
/* ---------- 7-point inspection (checker v8, 2026-07-10) ---------- */
.insp-points{display:flex;flex-direction:column;margin:.3rem 0}
.insp-pt{display:flex;align-items:center;gap:.5rem;width:100%;font-family:inherit;font-size:.8rem;font-weight:600;padding:.18rem .5rem;border-radius:6px;border:none;cursor:pointer;background:transparent;color:var(--ink);text-align:left;transition:background .1s}
.insp-pt:hover{background:var(--chip)}
.insp-pt-name{flex:1}
.insp-pt-badge{font-family:var(--font-mono);font-size:.68rem;font-weight:700;letter-spacing:.03em;text-transform:uppercase;white-space:nowrap}
.insp-pt.pt-pass .insp-pt-badge{color:var(--ok)}
.insp-pt.pt-attn .insp-pt-badge{color:var(--warn)}
.insp-pt.pt-fail .insp-pt-badge{color:var(--bad)}
.insp-pt.pt-na .insp-pt-badge{color:var(--muted)}
.insp-detail{font-size:.78rem;color:var(--ink);background:var(--chip);border-radius:8px;padding:.55rem .7rem;margin:.1rem 0 .6rem;line-height:1.55}
.edit-row{display:flex;gap:.4rem;margin-top:.3rem}
.edit-row input{flex:1;min-width:0;padding:.4rem .55rem;border:1px solid var(--line-2);border-radius:8px;font-family:inherit;font-size:.76rem;background:var(--card);color:var(--ink)}
.edit-row button{font-size:.76rem;font-weight:600;padding:.4rem .7rem;border-radius:8px;border:1px solid var(--line-2);background:var(--card);cursor:pointer;font-family:inherit;white-space:nowrap;color:var(--ink)}
.edit-row button:hover{background:var(--accent-wash);border-color:var(--accent)}
/* once the fix field has text, the button goes solid purple to invite the click */
.edit-row button.filled{background:var(--accent);border-color:var(--accent);color:#fff}
.edit-row button.filled:hover{background:var(--accent);opacity:.9}
.edit-hint{font-size:.68rem;color:var(--muted)}
/* ---------- lightbox: zoom + prev/next over whichever .grid the click came from ---------- */
/* Ported as-is from tools/control.html so the interaction matches exactly. */
#lightbox{position:fixed;inset:0;background:rgba(10,9,12,.92);display:none;align-items:center;justify-content:center;z-index:1000;user-select:none}
#lightbox .lb-stage{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden}
#lightbox img{max-width:90vw;max-height:88vh;object-fit:contain;cursor:zoom-in;transition:transform .08s ease-out;touch-action:none}
#lightbox img.zoomed{cursor:grab;transition:none}
#lightbox img.panning{cursor:grabbing}
#lightbox .lb-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);color:#fff;border:none;width:2.6rem;height:2.6rem;border-radius:50%;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
#lightbox .lb-btn:hover{background:rgba(255,255,255,.24)}
#lightbox .lb-prev{left:1rem}
#lightbox .lb-next{right:1rem}
#lightbox .lb-close{position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,.12);color:#fff;border:none;width:2.2rem;height:2.2rem;border-radius:50%;font-size:1.1rem;cursor:pointer}
#lightbox .lb-close:hover{background:rgba(255,255,255,.24)}
#lightbox .lb-counter{position:absolute;top:1.1rem;left:1rem;color:#eee;font-size:.8rem;background:rgba(255,255,255,.12);border-radius:6px;padding:.25rem .55rem}
#lightbox .lb-open-orig{position:absolute;bottom:1rem;left:50%;transform:translateX(-50%);color:#eee;font-size:.75rem;background:rgba(255,255,255,.12);border-radius:6px;padding:.3rem .7rem;text-decoration:none}
#lightbox .lb-open-orig:hover{background:rgba(255,255,255,.24)}
#lightbox .lb-hint{position:absolute;bottom:1rem;right:1rem;color:#999;font-size:.68rem}
.imgwrap img.lb-thumb{cursor:pointer}
/* .mode-chip removed 2026-07-17 — see 2-project-list.html for note. */
/* Exact-mode edit guard (Owner call, 2026-07-10): editing redraws the
   product, which breaks the pixel-lock promise — warn at the edit box and
   badge any AI-edited render so it can't pass as pixel-exact. */
.edit-warn{font-size:.68rem;line-height:1.45;color:var(--warn);background:var(--warn-wash);border-radius:8px;padding:.4rem .55rem;margin-top:.3rem}
.lockbreak-chip{position:absolute;bottom:.4rem;left:.4rem;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:.22rem .5rem;border-radius:8px;background:rgba(180,83,9,.92);color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.3)}
</style>

<body>
<div class="topbar"><div class="topbar-in">
  <a class="brand" href="2-project-list.html" style="text-decoration:none" title="All projects"><img src="../images/ts-logo.png" alt="" style="height:17px;width:auto;display:block;">Studio</a>
  <div class="crumbs"><a href="2-project-list.html">Projects</a><span>/</span><a href="#" id="crumb-proj">…</a><span>/</span><span class="cur">Check</span></div>
  <div class="who"><span>Owner</span><div class="avatar">O</div></div>
</div></div>

<div class="rail-wrap"><div class="rail">
  <div class="rail-step done" onclick="location.href='4-tags-editor.html?project='+encodeURIComponent(projectId)"><span class="n">✓</span>Brief &amp; Specs</div>
  <div class="rail-step done" onclick="location.href='5-scenes-editor.html?project='+encodeURIComponent(projectId)"><span class="n">✓</span>Scenes</div>
  <div class="rail-step active"><span class="n">3</span>Check</div>
  <div class="rail-step locked"><span class="n">4</span>Size and Text</div>
  <div class="rail-step locked"><span class="n">5</span>Review</div>
</div></div>

<div class="wrap">
  <div class="grid" id="all-grid"></div>

  <div class="savebar">
    <a class="btn btn-ghost" href="../full-service.html" style="margin-right:auto" title="Hand this campaign to the studio team — we take it from here">Ask a Creative Director for help</a>
    <button class="btn btn-next" onclick="location.href='8-compose.html?project='+encodeURIComponent(projectId)">Continue to Text →</button>
  </div>
</div>

<div id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <div class="lb-stage" onclick="if(event.target===this)closeLightbox()">
    <button class="lb-btn lb-prev" onclick="lbNext(-1)">‹</button>
    <img id="lb-img">
    <button class="lb-btn lb-next" onclick="lbNext(1)">›</button>
  </div>
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <div class="lb-counter" id="lb-counter"></div>
  <a class="lb-open-orig" id="lb-open-orig" target="_blank" rel="noopener">⤢ open original</a>
  <div class="lb-hint">click image to zoom · scroll to zoom · drag to pan · ← → to navigate · esc to close</div>
</div>
<script>
function qs(k){ return new URLSearchParams(location.search).get(k); }
function esc(s){ const d=document.createElement('div'); d.textContent=s??''; return d.innerHTML; }
const projectId = qs('project');
let renders = [];
let project = null;
// Only stage:'render' rows belong on this page — the pipeline moves
// forward (render -> check -> compose -> review), and a composed image
// never gets its own verdict, so it was falling into the "no verdict yet"
// bucket here and showing back up on Check with a "Run checker" button
// even though it's a step ahead, not something waiting to be checked.
async function loadRenders(){
  return (await db.listRenders(projectId)).filter(r => r.stage === 'render');
}
let referenceImageCache = null; // {mediaType, base64} — same reference reused for every render in this project

// Derives a spec-checker-style spec from the weighted brief tags (no
// projects.spec column exists — see app/README.md TODO 3). Matches the
// weight semantics already documented in ai-draft.js's tags system prompt:
// must -> reject severity (auto-rejects), should -> flag severity (checker
// flags for human review), flavor -> left out entirely ("not checked").
// Product tags only — creative tags (mood/background/style) are excluded
// from pass/fail checks; the checker verifies product accuracy, and scene/
// background/lighting differences are allowed per its own instructions.
function buildSpecFromTags(proj){
  const all = proj.tags?.product || [];
  const vision_checks = all
    .filter(t => t.w === 'must' || t.w === 'should')
    .map((t, i) => ({
      id: `${t.w}_${i}_${t.t.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/(^_|_$)/g, '')}`.slice(0, 60),
      item: t.t,
      when_visible: true,
      severity: t.w === 'must' ? 'reject' : 'flag',
    }));
  return {
    sku: (proj.product || proj.name || 'product').toLowerCase().replace(/[^a-z0-9]+/g, '-'),
    variant: proj.name.toLowerCase().replace(/[^a-z0-9]+/g, '-'),
    vision_checks,
    rules: { confidence_below: 80 },
  };
}

// Fetches a signed URL's bytes and returns {mediaType, base64} — the shape
// functions/checker.js expects for sourceImage/candidateImage.
async function toBase64Image(url){
  const res = await fetch(url);
  const blob = await res.blob();
  const mediaType = blob.type || 'image/jpeg';
  const buf = await blob.arrayBuffer();
  let binary = '';
  const bytes = new Uint8Array(buf);
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return { mediaType, base64: btoa(binary) };
}

// Bucket is private (RLS-protected), so getPublicUrl() doesn't work here —
// every image needs a short-lived signed URL fetched via the authenticated
// client. Cached per storage_path so re-renders (e.g. after a verdict click)
// don't re-request a signed URL for images that already have one.
const signedUrlCache = {};
async function resolveSignedUrls(rs){
  await Promise.all(rs.map(async r => {
    if (!r.storage_path || signedUrlCache[r.storage_path]) return;
    try { signedUrlCache[r.storage_path] = await db.getSignedUrl(r.storage_path); }
    catch (e) { signedUrlCache[r.storage_path] = ''; }
  }));
}

// Effective verdict: human_override wins, else the checker's own verdict —
// mirrors run_checker.py's sort loop (skip anything with human_override set,
// else sort by checker's hard-fail rule).
function effectiveVerdict(r){ return r.human_override || r.verdict; }

// Exact mode (projects.pipeline='pro') promises the product is the real
// photo's pixels, composited, never regenerated. The Edit box below regen-
// erates via AI, so on an Exact project it quietly breaks that promise —
// guarded with a warning + confirm (Owner call, 2026-07-10), and the edited
// copy is badged so it can't be mistaken for a pixel-exact render.
function isExactProject(){ return !!(project && project.pipeline === 'pro'); }
// Edited renders carry "-edit-<timestamp>" in the filename (editRender's
// naming convention below) — in Exact mode that means the lock is broken.
function isAiEdited(r){ return /-edit-\d+\./.test(r.filename || ''); }

// checker.js asks the model for a plain-language note ("overall_notes"/
// "note", 2-3 sentences) alongside the per-item list and the countable score.
function checkSummary(r){
  return r.checker && r.checker.overall_notes ? r.checker.overall_notes.trim() : '';
}

// LEGACY score badge — for renders checked before the v8 (7-point) rebuild,
// whose r.checker has a 0-100 vibe score but no r.checker.points. Keeps old
// data readable without re-running the checker on every past render.
function scoreBadge(r){
  const score = r.checker && typeof r.checker.score === 'number' ? r.checker.score : null;
  if (score === null) return '';
  const cls = score >= 80 ? 'v-checker-pass' : score >= 50 ? 'v-checker-review' : 'v-checker-fail';
  return `<span class="verdict-pill ${cls}">Score: ${score}</span>`;
}

// ---- 7-point inspection (checker v8) — the public, countable score. ----
// r.checker.score is verified÷applicable of the fixed seven (Shape, Color,
// Materials, Details, Clarity, Lighting, Scene). r.checker.points carries
// each point's name/blurb/verdict/reason straight from the checker result —
// this card just renders it.
function scoreRow(r){
  const c = r.checker;
  if (typeof c.score !== 'number') return '';
  const cls = c.score >= 80 ? 'v-checker-pass' : c.score >= 50 ? 'v-checker-review' : 'v-checker-fail';
  return `<span class="verdict-pill ${cls}">Score: ${c.score}</span>`;
}

// Each of the 7 points as a scannable row: name + numeric score, so issues
// are visible at a glance instead of buried in a prose summary. Click a row
// to expand its blurb + the model's specific reason underneath.
function pointsRow(r){
  const pts = r.checker.points.map(p => {
    const cls = p.verdict === 'pass' ? 'pt-pass' : p.verdict === 'attention' ? 'pt-attn' : p.verdict === 'fail' ? 'pt-fail' : 'pt-na';
    const badge = typeof p.score === 'number' ? p.score : '–';
    return `<button type="button" class="insp-pt ${cls}" onclick="togglePointDetail(event,'${r.id}','${p.key}')">
        <span class="insp-pt-name">${esc(p.name)}</span>
        <span class="insp-pt-badge">${esc(String(badge))}</span>
      </button>`;
  }).join('');
  return `<div class="insp-points">${pts}</div><div class="insp-detail" id="insp-detail-${r.id}" hidden></div>`;
}

// The "Fix now" button goes solid purple the moment the fix field has any
// text, so a written correction visibly invites the click.
function toggleFixBtn(renderId){
  const input = document.getElementById(`edit-instr-${renderId}`);
  const btn = document.getElementById(`fix-btn-${renderId}`);
  if (!input || !btn) return;
  btn.classList.toggle('filled', input.value.trim().length > 0);
}

// Click a point pill to see its blurb + the model's specific reason — one
// shared detail slot per card (not seven hidden divs), toggled open/closed.
function togglePointDetail(event, renderId, key){
  event.stopPropagation();
  const r = renders.find(x => x.id === renderId);
  const el = document.getElementById(`insp-detail-${renderId}`);
  if (!r || !r.checker || !r.checker.points || !el) return;
  const p = r.checker.points.find(pt => pt.key === key);
  if (!p) return;
  if (el.dataset.key === key && !el.hidden) { el.hidden = true; el.dataset.key = ''; return; }
  el.dataset.key = key;
  el.hidden = false;
  el.innerHTML = `<b>${esc(p.name)}.</b> ${esc(p.blurb)}${p.reason ? ` — ${esc(p.reason)}` : ''}`;
}


function cardHtml(r){
  const url = signedUrlCache[r.storage_path] || '';
  const verdict = effectiveVerdict(r);
  const hasInspection = !!(r.checker && Array.isArray(r.checker.points));

  // One toggle (Owner call, 2026-07-12): green = approved, not-green = not
  // approved. No separate reject button, no "Run checker" — images are scored
  // automatically at generation/edit time. Status slot kept for the auto-check.
  const overrideBlock = `<div class="override-row">
      <button class="ov-btn approve${verdict === 'approved' ? ' active' : ''}" onclick="toggleApproved('${r.id}')">${verdict === 'approved' ? '✓ Approved' : '✕ Not Approved'}</button>
    </div>
    <span class="check-status" id="check-status-${r.id}"></span>`;

  let checkBlock;
  if (hasInspection) {
    // Current (v8) shape — the 7-point inspection.
    checkBlock = `${scoreRow(r)}${pointsRow(r)}`;
  } else if (r.checker) {
    // Legacy shape — renders checked before the v8 rebuild.
    const summary = checkSummary(r);
    checkBlock = `${scoreBadge(r)}${summary ? `<p class="check-summary">${esc(summary)}</p>` : '<p class="check-summary">Checked — no summary returned.</p>'}`;
  } else {
    checkBlock = '<span class="verdict-pill v-checker-review">◐ not checked yet</span>';
  }

  // Exact mode: badge AI-edited copies (lock broken) and warn at the edit box.
  const lockBreakChip = (isExactProject() && isAiEdited(r))
    ? '<span class="lockbreak-chip" title="This copy was edited with AI, so the product is no longer a pixel-exact match to your photo.">Not pixel-locked</span>'
    : '';
  const editWarn = (isExactProject() && !isAiEdited(r))
    ? '<div class="edit-warn">Editing redraws the product with AI — the result won\'t be pixel-locked. For a different scene, re-run from Scenes instead.</div>'
    : '';

  return `<div class="card">
    <div class="imgwrap">
      <img class="lb-thumb" src="${esc(url)}" onclick="openLightbox(this)">
      <button class="fav-btn${r.is_favorite ? ' active' : ''}" title="Favorite" onclick="toggleFavorite(event,'${r.id}')">${r.is_favorite ? '♥' : '♡'}</button>
      <button class="del-btn" title="Delete" onclick="deleteRenderInline(event,'${r.id}','${esc(r.storage_path)}')">🗑</button>
      ${lockBreakChip}
    </div>
    <div class="body">
      ${checkBlock}
      ${overrideBlock}
      <div class="edit-row">
        <input type="text" id="edit-instr-${r.id}" placeholder="e.g. change the bowl color to blue" oninput="toggleFixBtn('${r.id}')">
        <button id="fix-btn-${r.id}" onclick="editRender('${r.id}')">Fix now</button>
      </div>
      ${editWarn}
      <span class="edit-hint" id="edit-status-${r.id}"></span>
    </div>
  </div>`;
}

async function render(){
  await resolveSignedUrls(renders);
  // One grid — every render, newest as loaded. Approval is a per-card toggle.
  document.getElementById('all-grid').innerHTML = renders.map(cardHtml).join('') || '<p style="color:var(--muted)">No images yet.</p>';
}

// Approval toggle (Owner call, 2026-07-12): green = approved, click to flip to
// not-approved and back. Sticky, same human_override write as before.
async function toggleApproved(renderId){
  const r = renders.find(x => x.id === renderId);
  if (!r) return;
  if (effectiveVerdict(r) === 'approved') {
    // Un-approve this one (no auto-reselect — user made an explicit choice)
    await db.setVerdict(renderId, 'rejected');
  } else {
    // Approve this one exclusively — clear approval on all others first
    const others = renders.filter(x => x.id !== renderId && effectiveVerdict(x) === 'approved');
    await Promise.all(others.map(x => db.setVerdict(x.id, 'rejected')));
    await db.setVerdict(renderId, 'approved');
  }
  renders = await loadRenders();
  await render();
}

async function toggleFavorite(event, renderId){
  event.stopPropagation();
  const r = renders.find(x => x.id === renderId);
  if (!r) return;
  const next = !r.is_favorite;
  r.is_favorite = next;
  await render();
  const { error } = await sb.from('renders').update({ is_favorite: next }).eq('id', renderId);
  if (error) { r.is_favorite = !next; await render(); alert('Could not update favorite: ' + error.message); }
}

async function deleteRenderInline(event, renderId, storagePath){
  event.stopPropagation();
  if (!confirm('Delete this image? This cannot be undone.')) return;
  try {
    if (storagePath) await db.removeFiles([storagePath]);
    const { error } = await sb.from('renders').delete().eq('id', renderId);
    if (error) throw error;
    renders = await loadRenders();
    await render();
  } catch (e) { alert('Delete failed: ' + (e.message || e)); }
}

// Runs the real checker Edge Function for one render: builds a spec from
// the project's weighted tags (no projects.spec column exists — see
// app/README.md TODO 3), fetches the render + the project's reference photo
// (project.reference_image — the same column generate.js's auto-check uses
// as its one fixed ground-truth image), base64-encodes both, and calls
// functions/checker.js. The status note lives per-card
// (id="check-status-<renderId>") since multiple renders could each be
// mid-check independently.
async function runChecker(renderId){
  const statusEl = document.getElementById(`check-status-${renderId}`);
  const r = renders.find(x => x.id === renderId);
  if (!r) return;
  if (!project.reference_image) {
    if (statusEl) { statusEl.textContent = 'no reference photo set for this project (reference_image)'; statusEl.classList.add('err'); }
    return;
  }
  if (statusEl) { statusEl.textContent = 'checking…'; statusEl.classList.add('busy'); }
  try {
    if (!referenceImageCache) {
      const refUrl = await db.getSignedUrl(project.reference_image);
      referenceImageCache = await toBase64Image(refUrl);
    }
    const candidateUrl = signedUrlCache[r.storage_path] || await db.getSignedUrl(r.storage_path);
    const candidateImage = await toBase64Image(candidateUrl);
    const spec = buildSpecFromTags(project);
    await callFunction('checker', { renderId, spec, sourceImage: referenceImageCache, candidateImage });
    renders = await loadRenders();
    await render();
  } catch (e) {
    if (statusEl) { statusEl.textContent = e.message || String(e); statusEl.classList.remove('busy'); statusEl.classList.add('err'); }
  }
}

// Edits ONE existing render in place via the deployed `edit-render` Edge
// Function (supabase/functions/edit-render/index.ts): feeds Gemini the
// render's own image bytes plus a targeted instruction ("keep everything,
// only change X"), instead of re-running full scene generation from the
// shot's original prompt. Saves the result as a brand-new render
// (unchecked, no verdict yet) so both versions sit side by side; run it
// through "Run checker" like any other. Ported off the local-only
// tools/edit-render/service.py (2026-07-08) — that script had no OpenCV
// dependency, unlike pixel-lock's compositor, so it moved to a real Edge
// Function outright instead of staying local.
async function editRender(renderId){
  const input = document.getElementById(`edit-instr-${renderId}`);
  const statusEl = document.getElementById(`edit-status-${renderId}`);
  const instruction = input.value.trim();
  if (!instruction) { statusEl.textContent = 'describe what should change first'; statusEl.classList.add('err'); return; }
  const r = renders.find(x => x.id === renderId);
  if (!r) return;
  // Exact-mode guard (Owner call, 2026-07-10): make breaking the pixel lock
  // an explicit opt-in, never a silent side effect of a quick edit.
  if (isExactProject() && !confirm('This is an Exact-render project. Editing redraws the product with AI, so the result will no longer be a pixel-exact match to your photo. Continue anyway?')) {
    return;
  }
  statusEl.textContent = 'editing…'; statusEl.classList.remove('err'); statusEl.classList.add('busy');
  // Chip instead of overlay so the user can review other renders while
  // this one is being redrawn. guardLeave: true — mid-edit refresh loses
  // the fal credit for a call that could be running 30-60s.
  const chip = showTaskChip('Editing your image…', 'Redrawing with your change, then scoring…', true);
  try {
    const sourceUrl = signedUrlCache[r.storage_path] || await db.getSignedUrl(r.storage_path);
    const { mediaType, base64 } = await toBase64Image(sourceUrl);
    const aspectRatio = (project.settings && project.settings.generation_aspect) || '1:1';

    const json = await callFunction('edit-render', {
      image_b64: base64, mime_type: mediaType, instruction, aspect_ratio: aspectRatio,
    });

    const ext = (json.mime_type.split('/')[1] || 'png').replace('jpeg', 'jpg');
    const baseName = r.filename.replace(/\.[^.]+$/, '');
    const filename = `${baseName}-edit-${Date.now()}.${ext}`;
    const path = db.storagePath(project.clients.slug, projectId, 'renders', filename);
    const bytes = Uint8Array.from(atob(json.image_b64), c => c.charCodeAt(0));
    await db.uploadFile(path, new Blob([bytes], { type: json.mime_type }));
    await db.upsertRender(projectId, filename, { storage_path: path, stage: 'render' });
    await db.createRunLogEntry(projectId, 'generate', `edited "${r.filename}" -> "${filename}": ${instruction}`);

    input.value = '';
    statusEl.textContent = 'scoring…';
    chip.setNote('Scoring the new image…');
    renders = await loadRenders();
    await render();
    // Regenerated image gets scored right away — no manual checker step.
    const newR = renders.find(x => x.filename === filename);
    if (newR) {
      try { await runChecker(newR.id); } catch (e) { /* per-card status shows it */ }
      // New render is the only approved image — reject all others unconditionally.
      await Promise.all(renders.filter(x => x.id !== newR.id).map(x => db.setVerdict(x.id, 'rejected')));
      await db.setVerdict(newR.id, 'approved');
      renders = await loadRenders();
      await render();
    }
    statusEl.textContent = ''; statusEl.classList.remove('busy');
    chip.done('Image updated');
  } catch (e) {
    statusEl.textContent = e.message || String(e); statusEl.classList.remove('busy'); statusEl.classList.add('err');
    chip.fail(e.message || String(e));
  }
}

// Enforce exclusive approval: at most one render can be approved at a time.
// Uses effectiveVerdict so a checker-set verdict on a new render can't silently
// co-exist with a human_override approval on an older one. An explicit human
// approval (human_override === 'approved') always wins the tie; otherwise the
// newest render is kept. Returns true if it changed anything (so callers can
// reload). Reused on load AND after auto-scoring unchecked renders, because the
// checker can flip an Exact composite to 'approved' after the load-time pass has
// already run — without a second pass that leaves two images approved at once.
async function enforceExclusiveApproval(){
  const approved = renders.filter(r => effectiveVerdict(r) === 'approved');
  if (approved.length === 0) {
    // Nothing approved yet — approve the newest so there's always a selection.
    if (renders.length === 0) return false;
    const latest = renders.reduce((a, b) => new Date(a.created_at) > new Date(b.created_at) ? a : b);
    await db.setVerdict(latest.id, 'approved');
    return true;
  }
  if (approved.length === 1) return false;
  // More than one approved — keep exactly one. Prefer an explicit human pick,
  // else the newest, then reject every other approved render.
  const humanPicks = approved.filter(r => r.human_override === 'approved');
  const pool = humanPicks.length > 0 ? humanPicks : approved;
  const keep = pool.reduce((a, b) => new Date(a.created_at) > new Date(b.created_at) ? a : b);
  await Promise.all(approved.filter(r => r.id !== keep.id).map(r => db.setVerdict(r.id, 'rejected')));
  return true;
}

async function init(){
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { location.href = '1-login.html'; return; }
  if (!projectId) return;
  project = await db.getProject(projectId);
  // Unlock forward rail steps the user has already been past.
  applyRailUnlocks(projectId).catch(() => {});
  document.getElementById('crumb-proj').textContent = project.name;
  document.getElementById('crumb-proj').href = `3-project-view.html?project=${encodeURIComponent(projectId)}`;
  document.title = `Checker — ${project.name} | Tolerance Studio`;
  renders = await loadRenders();
  if (await enforceExclusiveApproval()) renders = await loadRenders();
  await render();
  // Every image should already be scored — Scene renders are checked inside
  // `generate`, but Exact composites and AI edits arrive unchecked. Score any
  // that are still unchecked here so there's never a manual "run checker" step.
  // Sticky human overrides are respected regardless.
  const unchecked = renders.filter(r => !r.checker);
  for (const r of unchecked) {
    try { await runChecker(r.id); } catch (e) { /* per-card status already shows it */ }
  }
  // The checker may have just approved a freshly-scored render (e.g. an Exact
  // composite) on top of an already-approved one. Re-run the exclusivity pass
  // so only one stays approved.
  if (unchecked.length > 0) {
    renders = await loadRenders();
    if (await enforceExclusiveApproval()) renders = await loadRenders();
    await render();
  }
}
init();
</script>
