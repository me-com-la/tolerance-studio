<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Files — Tolerance Studio</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="app/lib/supabase.js"></script>
<script src="app/lib/lightbox.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#e8e6e1; --paper:#0c0b10; --card:#1a1820;
  --line:rgba(255,255,255,.1); --line-2:rgba(255,255,255,.18);
  --muted:#9a978f; --accent:#9d7aff; --accent-ink:#c4b0ff; --accent-wash:rgba(157,122,255,.15);
  --chip:#2a2735; --radius:14px;
  --font-display:'Barlow Condensed',sans-serif;
  --font-body:'IBM Plex Sans',system-ui,sans-serif;
  --font-mono:'IBM Plex Mono','Courier New',monospace;
  --thumb:280px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--paper);color:var(--ink);font-family:var(--font-body);line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.topbar{background:rgba(12,11,16,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
.topbar-in{max-width:88rem;margin:0 auto;padding:0 1.6rem;display:flex;align-items:center;justify-content:space-between;height:64px}
.brand{display:flex;align-items:center;gap:.5rem;font-family:var(--font-display);font-weight:700;font-size:1.1rem;text-transform:uppercase;letter-spacing:-.01em}
.who{display:flex;align-items:center;gap:.7rem;font-size:.85rem;color:var(--muted)}
.avatar{width:30px;height:30px;border-radius:8px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:600;font-size:.85rem}

.wrap{max-width:88rem;margin:0 auto;padding:2.2rem 1.6rem 4rem}
h1{font-family:var(--font-display);font-size:clamp(1.8rem,3.5vw,2.4rem);font-weight:700;text-transform:uppercase;letter-spacing:.01em}
.page-sub{color:var(--muted);font-size:.9rem;margin-top:.3rem}

.page-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1.2rem;margin-bottom:1.8rem}
.btn{display:inline-flex;align-items:center;gap:.5rem;font-size:.88rem;font-weight:600;padding:.7rem 1.3rem;border-radius:10px;border:none;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .15s;text-decoration:none;white-space:nowrap}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary{background:var(--accent);color:#fff}

.tabs{display:flex;gap:.4rem;border-bottom:1px solid var(--line);margin-bottom:1.6rem}
.tab{padding:.8rem 1.1rem;font-size:.9rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;background:none;border-left:none;border-right:none;border-top:none}
.tab.active{color:var(--ink);border-bottom-color:var(--accent)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--thumb),1fr));gap:.5rem}
.size-toggle{display:inline-flex;gap:.3rem;margin-left:auto}
.size-toggle button{font-family:var(--font-mono);font-size:.72rem;font-weight:600;padding:.35rem .65rem;border-radius:8px;border:1px solid var(--line-2);background:var(--card);color:var(--muted);cursor:pointer}
.size-toggle button.active{color:#fff;background:var(--accent);border-color:var(--accent)}
.grid[hidden]{display:none}
.card{border-radius:10px;overflow:hidden}
.card .imgwrap{position:relative;background:var(--chip);overflow:hidden;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center}
/* width/height:100% (not auto) — with data-full/no src (2026-07-11 lazy
   load), an auto-sized img has no intrinsic size to derive from and
   collapses to 0×0, which is an unreliable IntersectionObserver target
   (some browsers never fire isIntersecting for a zero-area element even
   sitting in-viewport — the lazy load would just silently never trigger).
   Filling the already-reserved .imgwrap box gives it real geometry before
   the image loads; object-fit:contain keeps the same letterboxed look
   once it does. */
.card img{width:100%;height:100%;object-fit:contain;display:block;cursor:pointer}
.empty{color:var(--muted);font-size:.88rem;padding:1rem 0}

.fav-btn,.del-btn{position:absolute;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;width:1.9rem;height:1.9rem;background:rgba(255,255,255,.15);color:#fff;opacity:0;transition:opacity .15s,background .15s;font-size:1rem}
.card:hover .fav-btn,.card:hover .del-btn{opacity:1}
.fav-btn{top:.4rem;right:.4rem}
.fav-btn:hover{background:rgba(255,255,255,.3)}
.fav-btn.active{opacity:1;color:var(--accent)}
.del-btn{top:.4rem;left:.4rem}
.del-btn:hover{background:#a33}

.pro-tag{position:absolute;bottom:.4rem;left:.4rem;background:rgba(0,0,0,.68);color:#fff;font-family:var(--font-mono);font-size:.62rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:.18rem .45rem;border-radius:5px;pointer-events:none}
.proj-link{position:absolute;bottom:.4rem;right:.4rem;max-width:calc(100% - .8rem);background:rgba(0,0,0,.68);color:#fff;font-family:var(--font-mono);font-size:.62rem;font-weight:600;letter-spacing:.02em;padding:.18rem .5rem;border-radius:5px;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.proj-link:hover{background:var(--accent)}

/* ---------- lightbox (reused as-is from app/lib/lightbox.js) ---------- */
#lightbox{position:fixed;inset:0;background:rgba(10,9,12,.92);display:none;align-items:center;justify-content:center;z-index:1000;user-select:none}
#lightbox .lb-stage{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden}
#lightbox img{max-width:90vw;max-height:88vh;object-fit:contain;cursor:zoom-in;transition:transform .08s ease-out;touch-action:none}
#lightbox img.zoomed{cursor:grab;transition:none}
#lightbox img.panning{cursor:grabbing}
#lightbox .lb-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);color:#fff;border:none;width:2.6rem;height:2.6rem;border-radius:50%;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
#lightbox .lb-btn:hover{background:rgba(255,255,255,.24)}
#lightbox .lb-prev{left:1rem}
#lightbox .lb-next{right:1rem}
#lightbox .lb-close{position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,.12);color:#fff;border:none;width:2.2rem;height:2.2rem;border-radius:50%;font-size:1.1rem;cursor:pointer}
#lightbox .lb-close:hover{background:rgba(255,255,255,.24)}
#lightbox .lb-counter{position:absolute;top:1.1rem;left:1rem;color:#eee;font-size:.8rem;background:rgba(255,255,255,.12);border-radius:6px;padding:.25rem .55rem}
#lightbox .lb-open-orig{position:absolute;bottom:1rem;left:50%;transform:translateX(-50%);color:#eee;font-size:.75rem;background:rgba(255,255,255,.12);border-radius:6px;padding:.3rem .7rem;text-decoration:none}
#lightbox .lb-open-orig:hover{background:rgba(255,255,255,.24)}
#lightbox .lb-hint{position:absolute;bottom:1rem;right:1rem;color:#999;font-size:.68rem}
</style>
</head>
<body>
<div class="topbar"><div class="topbar-in">
  <a class="brand" href="my-images.html" style="text-decoration:none" title="Files"><img src="images/ts-logo.png" alt="" style="height:17px;width:auto;display:block;">Files</a>
  <div class="who"><span id="who-email">…</span><div class="avatar" id="who-avatar">·</div></div>
</div></div>

<div class="wrap">
  <div class="page-head">
    <div>
      <h1 id="greeting">Welcome back</h1>
      <p class="page-sub" id="page-sub">Loading…</p>
    </div>
    <a class="btn btn-primary" href="app/2-project-list.html?new=1">＋ New Project</a>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-generations" onclick="switchTab('generations')">Generations<span id="count-generations"></span></button>
    <button class="tab" id="tab-favorites" onclick="switchTab('favorites')">Favorites<span id="count-favorites"></span></button>
    <span class="size-toggle" id="size-toggle">
      <button data-size="130" onclick="setThumbSize(130,this)">S</button>
      <button data-size="190" onclick="setThumbSize(190,this)">M</button>
      <button data-size="280" class="active" onclick="setThumbSize(280,this)">L</button>
    </span>
  </div>

  <div class="grid" id="grid-generations"></div>
  <div class="grid" id="grid-favorites" hidden></div>
</div>

<div id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <div class="lb-stage" onclick="if(event.target===this)closeLightbox()">
    <button class="lb-btn lb-prev" onclick="lbNext(-1)">‹</button>
    <img id="lb-img">
    <button class="lb-btn lb-next" onclick="lbNext(1)">›</button>
  </div>
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <div class="lb-counter" id="lb-counter"></div>
  <a class="lb-open-orig" id="lb-open-orig" target="_blank" rel="noopener">⤢ open original</a>
  <div class="lb-hint">click image to zoom · scroll to zoom · drag to pan · ← → to navigate · esc to close</div>
</div>

<script>
function esc(s){ const d=document.createElement('div'); d.textContent=s??''; return d.innerHTML; }
function setThumbSize(px, btn){
  document.documentElement.style.setProperty('--thumb', px + 'px');
  btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

let allRenders = [];
let signedUrls = {};

// No client/project filter here on purpose — RLS (member_all_renders policy,
// migrations/002_beta_members.sql) already scopes `renders` to whatever this
// signed-in user owns, across every project and both Standard/Pro pipelines.
async function loadAllRenders(){
  // projects(pipeline) is an embedded resource via the renders.project_id FK
  // (see app/migrations/003_project_pipeline.sql) — lets each card show which
  // app actually generated it, since this page mixes Standard and Pro renders.
  const { data, error } = await sb.from('renders')
    .select('id, storage_path, filename, stage, is_favorite, project_id, projects(pipeline, name)')
    .order('created_at', { ascending: false });
  if (error) throw error;
  return data;
}

// One batched createSignedUrls() call instead of N parallel createSignedUrl()
// calls (Owner report, 2026-07-11: page felt slow on load) — with a real
// library this was firing a network round-trip PER image before the grid
// could even render its first row. Same result shape either way (a
// storage_path -> signed URL map), just one request instead of N.
async function resolveSignedUrls(rows){
  const paths = [...new Set(rows.map(r => r.storage_path).filter(p => p && !signedUrls[p]))];
  if (!paths.length) return;
  const { data, error } = await sb.storage.from('projects').createSignedUrls(paths, 3600);
  if (error) { paths.forEach(p => signedUrls[p] = ''); return; }
  data.forEach((d, i) => { signedUrls[paths[i]] = d.error ? '' : d.signedUrl; });
}

// Real viewport-gated lazy load (Owner report, 2026-07-11: images below the
// fold were already loaded before scrolling there). loading="lazy" alone
// wasn't enough — these are full, un-thumbnailed renders (no resize step
// exists anywhere in the pipeline), so on a fast connection the browser's
// own lookahead margin was generous enough to fetch many rows' worth of
// multi-MB images at once. This puts the real URL in data-full (not src) so
// the fetch only starts once a card is actually near the viewport — a tight
// 400px margin, not the browser's own (larger, connection-dependent) one.
// lightbox.js reads data-full directly, so Next/Prev still works instantly
// on a card the observer hasn't reached yet.
function handleLazyIntersect(entries){
  entries.forEach(entry => {
    if (!entry.isIntersecting) return;
    const img = entry.target;
    if (img.dataset.full) img.src = img.dataset.full;
    lazyThumbObserver.unobserve(img);
  });
}
const lazyThumbObserver = new IntersectionObserver(handleLazyIntersect, { rootMargin: '400px 0px' });
function observeLazyThumbs(){
  document.querySelectorAll('img.lb-thumb[data-full]').forEach(img => lazyThumbObserver.observe(img));
}

function cardHtml(r){
  const url = signedUrls[r.storage_path] || '';
  const isPro = r.projects?.pipeline === 'pro';
  // One app since the 2026-07-10 merge — every project opens under app/;
  // pipeline only decides the badge (Exact = the old Pro pixel-lock mode).
  const projHref = r.project_id ? `app/3-project-view.html?project=${esc(r.project_id)}` : '';
  const projName = r.projects?.name || 'Open project';
  return `<div class="card">
    <div class="imgwrap">
      <img class="lb-thumb" data-full="${esc(url)}" loading="lazy" alt="" onclick="openLightbox(this)">
      <button class="fav-btn${r.is_favorite ? ' active' : ''}" title="Favorite" onclick="toggleFavorite(event,'${r.id}')">${r.is_favorite ? '♥' : '♡'}</button>
      <button class="del-btn" title="Delete" onclick="deleteRender(event,'${r.id}','${esc(r.storage_path)}')">🗑</button>
      ${isPro ? '<span class="pro-tag">Exact</span>' : ''}
      ${projHref ? `<a class="proj-link" href="${esc(projHref)}" title="Open ${esc(projName)}'s overview" onclick="event.stopPropagation()">📁 ${esc(projName)}</a>` : ''}
    </div>
  </div>`;
}

function renderGrids(){
  const favorites = allRenders.filter(r => r.is_favorite);
  document.getElementById('grid-generations').innerHTML = allRenders.map(cardHtml).join('') || '<p class="empty">No generations yet.</p>';
  document.getElementById('grid-favorites').innerHTML = favorites.map(cardHtml).join('') || '<p class="empty">No favorites yet.</p>';
  document.getElementById('count-generations').textContent = ` (${allRenders.length})`;
  document.getElementById('count-favorites').textContent = ` (${favorites.length})`;
  document.getElementById('page-sub').textContent = `${allRenders.length} generation${allRenders.length===1?'':'s'} · ${favorites.length} favorite${favorites.length===1?'':'s'}`;

  // innerHTML above just replaced every <img>, so the observer needs fresh
  // targets — old (now-detached) elements just stop being watched, harmless.
  observeLazyThumbs();
}

async function toggleFavorite(event, id){
  event.stopPropagation();
  const r = allRenders.find(x => x.id === id);
  if (!r) return;
  const next = !r.is_favorite;
  r.is_favorite = next;
  renderGrids();
  const { error } = await sb.from('renders').update({ is_favorite: next }).eq('id', id);
  if (error) { r.is_favorite = !next; renderGrids(); alert('Could not update favorite: ' + error.message); }
}

async function deleteRender(event, id, storagePath){
  event.stopPropagation();
  if (!confirm('Delete this image? This cannot be undone.')) return;
  try {
    if (storagePath) await sb.storage.from('projects').remove([storagePath]);
    const { error } = await sb.from('renders').delete().eq('id', id);
    if (error) throw error;
    allRenders = allRenders.filter(r => r.id !== id);
    renderGrids();
  } catch (e) { alert('Delete failed: ' + (e.message || e)); }
}

function switchTab(name){
  document.getElementById('tab-generations').classList.toggle('active', name === 'generations');
  document.getElementById('tab-favorites').classList.toggle('active', name === 'favorites');
  document.getElementById('grid-generations').hidden = name !== 'generations';
  document.getElementById('grid-favorites').hidden = name !== 'favorites';
}

(async function init(){
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { location.href = 'login.html?next=my-images.html'; return; }

  // Same email-prefix-as-name convention as assets/app-switcher.js's account
  // dropdown — no separate display-name field exists on the user yet.
  const email = session.user && session.user.email;
  if (email) document.getElementById('greeting').textContent = `Welcome back, ${email.split('@')[0]}`;

  try {
    allRenders = await loadAllRenders();
    await resolveSignedUrls(allRenders);
    renderGrids();
  } catch (e) {
    document.getElementById('page-sub').textContent = 'Could not load images: ' + (e.message || e);
  }
})();
</script>
<script src="assets/app-switcher.js"></script>
</body>
</html>
