<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Files — Tolerance Studio</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="app/lib/supabase.js"></script>
<script src="app/lib/lightbox.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#111014; --paper:#f7f6f3; --card:#ffffff;
  --line:rgba(17,16,20,.12); --line-2:rgba(17,16,20,.22);
  --muted:#5d5b57; --accent:#d8502d; --accent-ink:#7a2a14; --accent-wash:#fbeae3;
  --chip:#eceae6; --radius:14px;
  --font-display:'Barlow Condensed',sans-serif;
  --font-body:'IBM Plex Sans',system-ui,sans-serif;
  --font-mono:'IBM Plex Mono','Courier New',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--paper);color:var(--ink);font-family:var(--font-body);line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.topbar{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
.topbar-in{max-width:88rem;margin:0 auto;padding:0 1.6rem;display:flex;align-items:center;justify-content:space-between;height:64px}
.brand{display:flex;align-items:center;gap:.5rem;font-family:var(--font-display);font-weight:700;font-size:1.1rem;text-transform:uppercase;letter-spacing:-.01em}
.who{display:flex;align-items:center;gap:.7rem;font-size:.85rem;color:var(--muted)}
.avatar{width:30px;height:30px;border-radius:8px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:600;font-size:.85rem}
.subnav{background:#fff;border-bottom:1px solid var(--line)}
.subnav-in{max-width:88rem;margin:0 auto;padding:0 1.6rem;display:flex;gap:.4rem}
.tier-tab{padding:.85rem 1.1rem;font-size:.86rem;font-weight:600;color:var(--muted);text-decoration:none;border-bottom:2px solid transparent}
.tier-tab:hover{color:var(--ink)}
.tier-tab.active{color:var(--ink);border-bottom-color:var(--accent)}

.wrap{max-width:88rem;margin:0 auto;padding:2.2rem 1.6rem 4rem}
h1{font-family:var(--font-display);font-size:clamp(1.8rem,3.5vw,2.4rem);font-weight:700;text-transform:uppercase;letter-spacing:.01em}
.page-sub{color:var(--muted);font-size:.9rem;margin-top:.3rem;margin-bottom:1.8rem}

.tabs{display:flex;gap:.4rem;border-bottom:1px solid var(--line);margin-bottom:1.6rem}
.tab{padding:.8rem 1.1rem;font-size:.9rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;background:none;border-left:none;border-right:none;border-top:none}
.tab.active{color:var(--ink);border-bottom-color:var(--accent)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.5rem}
.grid[hidden]{display:none}
.card{border-radius:10px;overflow:hidden}
.card .imgwrap{position:relative;aspect-ratio:4/3;background:#eee;overflow:hidden}
.card img{width:100%;height:100%;object-fit:cover;display:block;cursor:pointer}
.empty{color:var(--muted);font-size:.88rem;padding:1rem 0}

.fav-btn,.del-btn{position:absolute;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;width:1.9rem;height:1.9rem;background:rgba(17,16,20,.5);color:#fff;opacity:0;transition:opacity .15s,background .15s;font-size:1rem}
.card:hover .fav-btn,.card:hover .del-btn{opacity:1}
.fav-btn{top:.4rem;right:.4rem}
.fav-btn:hover{background:rgba(17,16,20,.72)}
.fav-btn.active{opacity:1;color:var(--accent)}
.del-btn{top:.4rem;left:.4rem}
.del-btn:hover{background:#a33}

/* ---------- lightbox (reused as-is from app/lib/lightbox.js) ---------- */
#lightbox{position:fixed;inset:0;background:rgba(10,9,12,.92);display:none;align-items:center;justify-content:center;z-index:1000;user-select:none}
#lightbox .lb-stage{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden}
#lightbox img{max-width:90vw;max-height:88vh;object-fit:contain;cursor:zoom-in;transition:transform .08s ease-out;touch-action:none}
#lightbox img.zoomed{cursor:grab;transition:none}
#lightbox img.panning{cursor:grabbing}
#lightbox .lb-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);color:#fff;border:none;width:2.6rem;height:2.6rem;border-radius:50%;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
#lightbox .lb-btn:hover{background:rgba(255,255,255,.24)}
#lightbox .lb-prev{left:1rem}
#lightbox .lb-next{right:1rem}
#lightbox .lb-close{position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,.12);color:#fff;border:none;width:2.2rem;height:2.2rem;border-radius:50%;font-size:1.1rem;cursor:pointer}
#lightbox .lb-close:hover{background:rgba(255,255,255,.24)}
#lightbox .lb-counter{position:absolute;top:1.1rem;left:1rem;color:#eee;font-size:.8rem;background:rgba(255,255,255,.12);border-radius:6px;padding:.25rem .55rem}
#lightbox .lb-open-orig{position:absolute;bottom:1rem;left:50%;transform:translateX(-50%);color:#eee;font-size:.75rem;background:rgba(255,255,255,.12);border-radius:6px;padding:.3rem .7rem;text-decoration:none}
#lightbox .lb-open-orig:hover{background:rgba(255,255,255,.24)}
#lightbox .lb-hint{position:absolute;bottom:1rem;right:1rem;color:#999;font-size:.68rem}
</style>
</head>
<body>
<div class="topbar"><div class="topbar-in">
  <a class="brand" href="my-images.html" style="text-decoration:none" title="Files"><img src="images/ts-logo.png" alt="" style="height:17px;width:auto;display:block;">Files</a>
  <div class="who"><span id="who-email">…</span><div class="avatar" id="who-avatar">·</div></div>
</div></div>
<div class="subnav"><div class="subnav-in">
  <a href="my-images.html" class="tier-tab active">Files</a>
  <a href="app/2-project-list.html" class="tier-tab">Standard</a>
  <a href="pro/2-project-list.html" class="tier-tab">Pro</a>
</div></div>

<div class="wrap">
  <h1>Files</h1>
  <p class="page-sub" id="page-sub">Loading…</p>

  <div class="tabs">
    <button class="tab active" id="tab-generations" onclick="switchTab('generations')">Generations<span id="count-generations"></span></button>
    <button class="tab" id="tab-favorites" onclick="switchTab('favorites')">Favorites<span id="count-favorites"></span></button>
  </div>

  <div class="grid" id="grid-generations"></div>
  <div class="grid" id="grid-favorites" hidden></div>
</div>

<div id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <div class="lb-stage" onclick="if(event.target===this)closeLightbox()">
    <button class="lb-btn lb-prev" onclick="lbNext(-1)">‹</button>
    <img id="lb-img">
    <button class="lb-btn lb-next" onclick="lbNext(1)">›</button>
  </div>
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <div class="lb-counter" id="lb-counter"></div>
  <a class="lb-open-orig" id="lb-open-orig" target="_blank" rel="noopener">⤢ open original</a>
  <div class="lb-hint">click image to zoom · scroll to zoom · drag to pan · ← → to navigate · esc to close</div>
</div>

<script>
function esc(s){ const d=document.createElement('div'); d.textContent=s??''; return d.innerHTML; }

let allRenders = [];
let signedUrls = {};

// No client/project filter here on purpose — RLS (member_all_renders policy,
// migrations/002_beta_members.sql) already scopes `renders` to whatever this
// signed-in user owns, across every project and both Standard/Pro pipelines.
async function loadAllRenders(){
  const { data, error } = await sb.from('renders')
    .select('id, storage_path, filename, stage, is_favorite')
    .order('created_at', { ascending: false });
  if (error) throw error;
  return data;
}

async function resolveSignedUrls(rows){
  await Promise.all(rows.map(async r => {
    if (!r.storage_path || signedUrls[r.storage_path]) return;
    try {
      const { data, error } = await sb.storage.from('projects').createSignedUrl(r.storage_path, 3600);
      signedUrls[r.storage_path] = error ? '' : data.signedUrl;
    } catch (e) { signedUrls[r.storage_path] = ''; }
  }));
}

function cardHtml(r){
  const url = signedUrls[r.storage_path] || '';
  return `<div class="card">
    <div class="imgwrap">
      <img class="lb-thumb" src="${esc(url)}" onclick="openLightbox(this)">
      <button class="fav-btn${r.is_favorite ? ' active' : ''}" title="Favorite" onclick="toggleFavorite(event,'${r.id}')">${r.is_favorite ? '♥' : '♡'}</button>
      <button class="del-btn" title="Delete" onclick="deleteRender(event,'${r.id}','${esc(r.storage_path)}')">🗑</button>
    </div>
  </div>`;
}

function renderGrids(){
  const favorites = allRenders.filter(r => r.is_favorite);
  document.getElementById('grid-generations').innerHTML = allRenders.map(cardHtml).join('') || '<p class="empty">No generations yet.</p>';
  document.getElementById('grid-favorites').innerHTML = favorites.map(cardHtml).join('') || '<p class="empty">No favorites yet.</p>';
  document.getElementById('count-generations').textContent = ` (${allRenders.length})`;
  document.getElementById('count-favorites').textContent = ` (${favorites.length})`;
  document.getElementById('page-sub').textContent = `${allRenders.length} generation${allRenders.length===1?'':'s'} · ${favorites.length} favorite${favorites.length===1?'':'s'}`;
}

async function toggleFavorite(event, id){
  event.stopPropagation();
  const r = allRenders.find(x => x.id === id);
  if (!r) return;
  const next = !r.is_favorite;
  r.is_favorite = next;
  renderGrids();
  const { error } = await sb.from('renders').update({ is_favorite: next }).eq('id', id);
  if (error) { r.is_favorite = !next; renderGrids(); alert('Could not update favorite: ' + error.message); }
}

async function deleteRender(event, id, storagePath){
  event.stopPropagation();
  if (!confirm('Delete this image? This cannot be undone.')) return;
  try {
    if (storagePath) await sb.storage.from('projects').remove([storagePath]);
    const { error } = await sb.from('renders').delete().eq('id', id);
    if (error) throw error;
    allRenders = allRenders.filter(r => r.id !== id);
    renderGrids();
  } catch (e) { alert('Delete failed: ' + (e.message || e)); }
}

function switchTab(name){
  document.getElementById('tab-generations').classList.toggle('active', name === 'generations');
  document.getElementById('tab-favorites').classList.toggle('active', name === 'favorites');
  document.getElementById('grid-generations').hidden = name !== 'generations';
  document.getElementById('grid-favorites').hidden = name !== 'favorites';
}

(async function init(){
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { location.href = 'login.html?next=my-images.html'; return; }

  try {
    allRenders = await loadAllRenders();
    await resolveSignedUrls(allRenders);
    renderGrids();
  } catch (e) {
    document.getElementById('page-sub').textContent = 'Could not load images: ' + (e.message || e);
  }
})();
</script>
<script src="assets/app-switcher.js"></script>
</body>
</html>
