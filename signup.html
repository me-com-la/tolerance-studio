<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up | Tolerance Studio</title>
<meta name="description" content="Create a free Tolerance Studio account — full access to Standard and Pro during beta.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<link rel="stylesheet" href="assets/auth.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="app/lib/supabase.js"></script>
</head>
<body>

<header class="hero auth-hero">
  <div class="wrap">
    <span class="hero-label">Free during beta</span>
    <h1>Create your account.</h1>
    <p>Full access to Standard and Pro while we're in beta. No card, no catch.</p>
  </div>
</header>

<section class="sec" style="padding-top:0">
  <div class="wrap auth-wrap">
    <form class="auth-card" onsubmit="doSignUp(); return false">
      <div class="field"><label for="email">Email</label>
        <input id="email" type="email" placeholder="you@company.com" required autocomplete="email"></div>
      <div class="field"><label for="pw">Password</label>
        <input id="pw" type="password" placeholder="8+ characters" required minlength="8" autocomplete="new-password"></div>
      <button class="btn btn-primary auth-btn" id="go" type="submit">Sign up free &rarr;</button>
      <p class="auth-status" id="status" role="status"></p>
      <p class="auth-alt">Already have an account? <a href="login.html">Log in</a></p>
    </form>
  </div>
</section>

<footer>
  <div class="wrap">
    <div>Tolerance Studio &middot; product imagery studio</div>
    <div class="footer-links">
      <a href="index.html#products">Products</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>
</footer>

<script>
(async function(){ // already signed in? straight to account
  var s = await sb.auth.getSession();
  if (s.data.session) location.href = 'account.html';
})();
async function doSignUp(){
  var status = document.getElementById('status');
  var btn = document.getElementById('go');
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('pw').value;
  btn.disabled = true; status.textContent = 'creating account…';
  var r = await sb.auth.signUp({ email: email, password: password });
  if (r.error){ btn.disabled = false; status.textContent = r.error.message; return false; }
  if (r.data.session){ location.href = 'account.html'; }
  else { status.textContent = 'Check your email to confirm your account, then log in.'; btn.disabled = false; }
  return false;
}
</script>
<script src="assets/nav.js"></script>
</body>
</html>
